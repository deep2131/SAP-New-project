name: Download Version Tagged iFlows from SAP BTP

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Feature branch where downloaded iFlows will be pushed"
        required: false
        default: "feature/btp-iflow-backup"
      deployment_marker:
        description: "Version tag suffix"
        required: false
        default: "ReadyForDeployment"

  schedule:
    # Runs twice daily at 09:00 and 18:00 IST
    # GitHub cron uses UTC
    - cron: "30 3,12 * * *"

permissions:
  contents: write

env:
  TARGET_BRANCH: feature/btp-iflow-backup
  DEPLOYMENT_MARKER: ReadyForDeployment
  DOWNLOAD_DIR: btp-iflows
  EXTRACT_ZIP: "true"

jobs:
  download-version-tagged-iflows:
    name: Download iFlows with version deployment tag
    runs-on: ubuntu-latest
    environment: dev
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve runtime inputs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET_BRANCH=${{ github.event.inputs.target_branch }}" >> $GITHUB_ENV
            echo "DEPLOYMENT_MARKER=${{ github.event.inputs.deployment_marker }}" >> $GITHUB_ENV
          fi

          echo "Target branch: $TARGET_BRANCH"
          echo "Deployment marker: $DEPLOYMENT_MARKER"

      - name: Configure Git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or switch to target feature branch
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin

          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH"; then
            echo "Branch exists remotely. Checking out $TARGET_BRANCH"
            git checkout "$TARGET_BRANCH"
            git pull origin "$TARGET_BRANCH"
          else
            echo "Branch does not exist. Creating $TARGET_BRANCH"
            git checkout -b "$TARGET_BRANCH"
          fi

      - name: Get SAP BTP OAuth token
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          TOKEN_RESPONSE=$(curl -sS --fail \
            --request POST "$SAP_BTP_TOKEN_URL/oauth/token" \
            --user "$SAP_BTP_OAUTH_CLIENT_ID:$SAP_BTP_OAUTH_CLIENT_SECRET" \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data "grant_type=client_credentials")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Failed to fetch OAuth token from SAP BTP"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          echo "::add-mask::$ACCESS_TOKEN"
          echo "SAP_ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Fetch and filter iFlows with deployment version tag
        shell: bash
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          if [ -z "${SAP_CPI_API_BASE_URL:-}" ]; then
            echo "ERROR: SAP_CPI_API_BASE_URL is missing."
            exit 1
          fi

          SAP_CPI_API_BASE_URL="${SAP_CPI_API_BASE_URL%/}"

          mkdir -p "$DOWNLOAD_DIR"

          echo "Fetching design-time artifacts from SAP BTP..."

          curl -sS --fail \
            --request GET "$SAP_CPI_API_BASE_URL/api/v1/IntegrationDesigntimeArtifacts?\$format=json" \
            --header "Authorization: Bearer $SAP_ACCESS_TOKEN" \
            --header "Accept: application/json" \
            --output artifacts-response.json

          echo "Filtering iFlows with allowed deployment tag formats..."

          python3 << 'PY'
          import json
          import re

          deployment_marker = "ReadyForDeployment"

          # Accepts:
          # v1.1.2.ReadyForDeployment
          # v1.1.2-ReadyForDeployment
          # v1.1.2_ReadyForDeployment
          deployment_tag_pattern = re.compile(
              rf"v\d+\.\d+\.\d+[.\-_]{re.escape(deployment_marker)}"
          )

          with open("artifacts-response.json", "r", encoding="utf-8") as file:
              payload = json.load(file)

          artifacts = payload.get("d", {}).get("results", [])

          matched = []
          skipped = []

          for artifact in artifacts:
              artifact_id = artifact.get("Id")
              artifact_name = artifact.get("Name", artifact_id)

              # This is the real SAP CPI version to be used in download URL.
              # Usually this may be "active".
              sap_version = artifact.get("Version") or "active"

              searchable_fields = [
                  artifact.get("Version"),
                  artifact.get("Description"),
                  artifact.get("Name"),
                  artifact.get("Tags"),
                  artifact.get("Tag"),
                  artifact.get("Labels"),
                  artifact.get("CustomTags"),
                  artifact.get("Keywords"),
              ]

              searchable_text = " ".join(
                  str(field) for field in searchable_fields if field
              )

              deployment_tag_match = deployment_tag_pattern.search(searchable_text)

              if artifact_id and deployment_tag_match:
                  matched.append({
                      "id": artifact_id,
                      "name": artifact_name,
                      "sapVersion": sap_version,
                      "deploymentTag": deployment_tag_match.group(0)
                  })
              else:
                  skipped.append({
                      "id": artifact_id,
                      "name": artifact_name,
                      "sapVersion": sap_version,
                      "reason": "No valid ReadyForDeployment version tag found"
                  })

          with open("matched-iflows.json", "w", encoding="utf-8") as file:
              json.dump(matched, file, indent=2)

          with open("skipped-iflows.json", "w", encoding="utf-8") as file:
              json.dump(skipped, file, indent=2)

          print(f"Matched iFlows: {len(matched)}")
          print(f"Skipped iFlows: {len(skipped)}")

          for item in matched:
              print(
                  f"- {item['id']} | SAP Version: {item['sapVersion']} | "
                  f"Deployment Tag: {item['deploymentTag']}"
              )
          PY

          MATCH_COUNT=$(jq length matched-iflows.json)

          if [ "$MATCH_COUNT" -eq 0 ]; then
            echo "No iFlows found with valid deployment version tag."
            exit 0
          fi
      - name: Debug SAP artifact versions
        shell: bash
        run: |
          echo "SAP artifacts returned by API:"
          jq -r '.d.results[] | "ID: \(.Id) | Name: \(.Name) | Version: \(.Version) | Description: \(.Description)"' artifacts-response.json   
      - name: Diagnose SAP CPI API endpoints
        shell: bash
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          SAP_CPI_API_BASE_URL="${SAP_CPI_API_BASE_URL%/}"

          echo "Checking SAP CPI API base URL..."

          echo "1. Testing metadata endpoint..."
          curl -sS \
            --request GET "$SAP_CPI_API_BASE_URL/api/v1/\$metadata" \
            --header "Authorization: Bearer $SAP_ACCESS_TOKEN" \
            --header "Accept: application/xml" \
            --output metadata.xml \
            --write-out "HTTP_CODE=%{http_code}\n"

          echo "2. Testing artifact collection endpoint..."
          curl -sS \
            --request GET "$SAP_CPI_API_BASE_URL/api/v1/IntegrationDesigntimeArtifacts?\$top=5&\$format=json" \
            --header "Authorization: Bearer $SAP_ACCESS_TOKEN" \
            --header "Accept: application/json" \
            --output artifacts-test.json \
            --write-out "HTTP_CODE=%{http_code}\n"

          echo "Artifact sample:"
          cat artifacts-test.json | jq '.d.results[] | {Id, Name, Version, PackageId, ArtifactType, Type, Description}' || true   
      - name: Download matched iFlows from SAP BTP
        shell: bash
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          SAP_CPI_API_BASE_URL="${SAP_CPI_API_BASE_URL%/}"

          jq -c '.[]' matched-iflows.json | while read -r artifact; do
            IFLOW_ID=$(echo "$artifact" | jq -r '.id')
            IFLOW_NAME=$(echo "$artifact" | jq -r '.name')
            SAP_VERSION=$(echo "$artifact" | jq -r '.sapVersion')
            DEPLOYMENT_TAG=$(echo "$artifact" | jq -r '.deploymentTag')

            SAFE_ID=$(echo "$IFLOW_ID" | tr -cd '[:alnum:]_.-')
            SAFE_TAG=$(echo "$DEPLOYMENT_TAG" | tr -cd '[:alnum:]_.-')

            TARGET_PATH="$DOWNLOAD_DIR/$SAFE_ID/$SAFE_TAG"
            ZIP_FILE="$TARGET_PATH/${SAFE_ID}_${SAFE_TAG}.zip"

            mkdir -p "$TARGET_PATH"

            ENCODED_ID=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$IFLOW_ID''', safe=''))")
            ENCODED_VERSION=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$SAP_VERSION''', safe=''))")

            DOWNLOAD_URL="$SAP_CPI_API_BASE_URL/api/v1/IntegrationDesigntimeArtifacts(Id='$ENCODED_ID',Version='$ENCODED_VERSION')/\$value"

            echo "Downloading iFlow:"
            echo "ID             : $IFLOW_ID"
            echo "Name           : $IFLOW_NAME"
            echo "SAP Version    : $SAP_VERSION"
            echo "Deployment Tag : $DEPLOYMENT_TAG"

            HTTP_CODE=$(curl -sS \
              --request GET "$DOWNLOAD_URL" \
              --header "Authorization: Bearer $SAP_ACCESS_TOKEN" \
              --header "Accept: application/zip" \
              --output "$ZIP_FILE" \
              --write-out "%{http_code}")

            echo "HTTP status: $HTTP_CODE"

            if [ "$HTTP_CODE" != "200" ]; then
              echo "ERROR: Download failed."
              echo "Reason may be wrong SAP Version, wrong CPI API base URL, or unsupported tenant endpoint."
              echo "URL pattern used:"
              echo "$SAP_CPI_API_BASE_URL/api/v1/IntegrationDesigntimeArtifacts(Id='<ID>',Version='<SAP_VERSION>')/\$value"
              rm -f "$ZIP_FILE"
              exit 1
            fi

            if [ ! -s "$ZIP_FILE" ]; then
              echo "ERROR: Downloaded file is empty."
              exit 1
            fi

            if [ "$EXTRACT_ZIP" = "true" ]; then
              EXTRACT_PATH="$TARGET_PATH/extracted"
              rm -rf "$EXTRACT_PATH"
              mkdir -p "$EXTRACT_PATH"
              unzip -q "$ZIP_FILE" -d "$EXTRACT_PATH"
            fi

            echo "Downloaded successfully: $ZIP_FILE"
          done

      - name: Create download manifest
        shell: bash
        run: |
          MANIFEST_FILE="$DOWNLOAD_DIR/download-manifest.json"

          jq --arg downloadedAt "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
             --arg marker "$DEPLOYMENT_MARKER" \
             --arg branch "$TARGET_BRANCH" \
             '{
                downloadedAtUtc: $downloadedAt,
                deploymentMarker: $marker,
                acceptedVersionPattern: "v<major>.<minor>.<patch>-" + $marker,
                targetBranch: $branch,
                downloadedArtifacts: .
              }' matched-iflows.json > "$MANIFEST_FILE"

          echo "Manifest created:"
          cat "$MANIFEST_FILE"

      - name: Commit and push downloaded iFlows
        shell: bash
        run: |
          set -euo pipefail

          git add "$DOWNLOAD_DIR"

          if git diff --staged --quiet; then
            echo "No changes detected. Nothing to commit."
            exit 0
          fi

          git commit -m "Download BTP iFlows with version tag $DEPLOYMENT_MARKER"

          git push origin "$TARGET_BRANCH"
