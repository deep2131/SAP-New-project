name: Download ReadyForDeployment iFlows from SAP BTP

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Feature branch where downloaded iFlows will be pushed"
        required: false
        default: "feature/btp-iflow-backup"

      deployment_marker:
        description: "Deployment marker used in version tag"
        required: false
        default: "ReadyForDeployment"

      sap_download_version:
        description: "SAP CPI version used in download URL. Usually active."
        required: false
        default: "active"

  schedule:
    # Runs twice daily at 09:00 and 18:00 IST
    # GitHub cron is UTC
    - cron: "30 3,12 * * *"

permissions:
  contents: write

env:
  TARGET_BRANCH: feature/btp-iflow-backup
  DEPLOYMENT_MARKER: ReadyForDeployment

  # IMPORTANT:
  # This is the SAP CPI artifact version used in the download URL.
  # In many SAP CPI tenants this is "active".
  SAP_DOWNLOAD_VERSION: active

  DOWNLOAD_DIR: btp-iflows
  EXTRACT_ZIP: "true"

jobs:
  download-ready-iflows:
    name: Download tagged iFlows from SAP BTP
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve runtime inputs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET_BRANCH=${{ github.event.inputs.target_branch }}" >> "$GITHUB_ENV"
            echo "DEPLOYMENT_MARKER=${{ github.event.inputs.deployment_marker }}" >> "$GITHUB_ENV"
            echo "SAP_DOWNLOAD_VERSION=${{ github.event.inputs.sap_download_version }}" >> "$GITHUB_ENV"
          fi

          echo "Target branch resolved."
          echo "Deployment marker resolved."
          echo "SAP download version resolved."

      - name: Validate required GitHub secrets
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          echo "Validating required secrets..."

          if [ -z "${SAP_BTP_TOKEN_URL:-}" ]; then
            echo "ERROR: SAP_BTP_TOKEN_URL secret is missing or empty."
            exit 1
          fi

          if [ -z "${SAP_BTP_OAUTH_CLIENT_ID:-}" ]; then
            echo "ERROR: SAP_BTP_OAUTH_CLIENT_ID secret is missing or empty."
            exit 1
          fi

          if [ -z "${SAP_BTP_OAUTH_CLIENT_SECRET:-}" ]; then
            echo "ERROR: SAP_BTP_OAUTH_CLIENT_SECRET secret is missing or empty."
            exit 1
          fi

          if [ -z "${SAP_CPI_API_BASE_URL:-}" ]; then
            echo "ERROR: SAP_CPI_API_BASE_URL secret is missing or empty."
            exit 1
          fi

          if [[ "$SAP_BTP_TOKEN_URL" != https://* ]]; then
            echo "ERROR: SAP_BTP_TOKEN_URL must start with https://"
            exit 1
          fi

          if [[ "$SAP_CPI_API_BASE_URL" != https://* ]]; then
            echo "ERROR: SAP_CPI_API_BASE_URL must start with https://"
            exit 1
          fi

          echo "All required secrets are configured."

      - name: Configure Git
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or switch to target feature branch
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin

          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH"; then
            echo "Remote branch exists: $TARGET_BRANCH"
            git checkout "$TARGET_BRANCH"
            git pull origin "$TARGET_BRANCH"
          else
            echo "Remote branch does not exist. Creating: $TARGET_BRANCH"
            git checkout -b "$TARGET_BRANCH"
          fi

      - name: Get SAP BTP OAuth token
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          SAP_BTP_TOKEN_URL="${SAP_BTP_TOKEN_URL%/}"

          if [[ "$SAP_BTP_TOKEN_URL" == */oauth/token ]]; then
            TOKEN_ENDPOINT="$SAP_BTP_TOKEN_URL"
          else
            TOKEN_ENDPOINT="$SAP_BTP_TOKEN_URL/oauth/token"
          fi

          echo "Requesting SAP OAuth token..."

          TOKEN_RESPONSE=$(curl -sS \
            --request POST "$TOKEN_ENDPOINT" \
            --user "$SAP_BTP_OAUTH_CLIENT_ID:$SAP_BTP_OAUTH_CLIENT_SECRET" \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data "grant_type=client_credentials" \
            --write-out "\nHTTP_CODE=%{http_code}")

          HTTP_CODE=$(echo "$TOKEN_RESPONSE" | sed -n 's/^HTTP_CODE=//p')
          BODY=$(echo "$TOKEN_RESPONSE" | sed '/^HTTP_CODE=/d')

          echo "Token HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Failed to get SAP OAuth token."
            echo "$BODY"
            exit 1
          fi

          ACCESS_TOKEN=$(echo "$BODY" | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "ERROR: access_token not found in token response."
            echo "$BODY"
            exit 1
          fi

          echo "::add-mask::$ACCESS_TOKEN"
          echo "SAP_ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"

          echo "SAP OAuth token generated successfully."

      - name: Diagnose SAP CPI API endpoints
        shell: bash
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          SAP_CPI_API_BASE_URL="${SAP_CPI_API_BASE_URL%/}"

          echo "Running SAP CPI API diagnostics..."
          echo "Base URL host validation completed."

          echo "Testing metadata endpoint..."
          METADATA_HTTP_CODE=$(curl -sS \
            --request GET "$SAP_CPI_API_BASE_URL/api/v1/\$metadata" \
            --header "Authorization: Bearer $SAP_ACCESS_TOKEN" \
            --header "Accept: application/xml" \
            --output metadata.xml \
            --write-out "%{http_code}")

          echo "Metadata HTTP status: $METADATA_HTTP_CODE"

          if [ "$METADATA_HTTP_CODE" != "200" ]; then
            echo "WARNING: Metadata endpoint did not return 200."
            echo "This usually means wrong SAP_CPI_API_BASE_URL, missing role, or API not available on this host."
            echo "First 50 lines of response:"
            head -50 metadata.xml || true
          fi

          echo "Testing IntegrationDesigntimeArtifacts collection endpoint..."
          COLLECTION_HTTP_CODE=$(curl -sS \
            --request GET "$SAP_CPI_API_BASE_URL/api/v1/IntegrationDesigntimeArtifacts?\$top=5&\$format=json" \
            --header "Authorization: Bearer $SAP_ACCESS_TOKEN" \
            --header "Accept: application/json" \
            --output artifacts-test.json \
            --write-out "%{http_code}")

          echo "Collection HTTP status: $COLLECTION_HTTP_CODE"

          if [ "$COLLECTION_HTTP_CODE" != "200" ]; then
            echo "ERROR: IntegrationDesigntimeArtifacts collection endpoint failed."
            echo "Response:"
            cat artifacts-test.json || true
            exit 1
          fi

          echo "Sample artifacts returned by SAP:"
          jq -r '.d.results[]? | "ID: \(.Id) | Name: \(.Name) | Version: \(.Version) | Type: \(.ArtifactType // .Type // "N/A") | Description: \(.Description // "N/A")"' artifacts-test.json || true

      - name: Fetch and filter iFlows with ReadyForDeployment version tag
        shell: bash
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          SAP_CPI_API_BASE_URL="${SAP_CPI_API_BASE_URL%/}"

          mkdir -p "$DOWNLOAD_DIR"

          echo "Fetching all SAP CPI design-time artifacts..."

          HTTP_CODE=$(curl -sS \
            --request GET "$SAP_CPI_API_BASE_URL/api/v1/IntegrationDesigntimeArtifacts?\$format=json" \
            --header "Authorization: Bearer $SAP_ACCESS_TOKEN" \
            --header "Accept: application/json" \
            --output artifacts-response.json \
            --write-out "%{http_code}")

          echo "Fetch artifacts HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Failed to fetch IntegrationDesigntimeArtifacts."
            cat artifacts-response.json || true
            exit 1
          fi

          echo "Filtering iFlows with accepted deployment version formats:"
          echo "vX.Y.Z.$DEPLOYMENT_MARKER"
          echo "vX.Y.Z-$DEPLOYMENT_MARKER"
          echo "vX.Y.Z_$DEPLOYMENT_MARKER"

          python3 << 'PY'
          import json
          import os
          import re

          deployment_marker = os.environ.get("DEPLOYMENT_MARKER", "ReadyForDeployment")
          sap_download_version_override = os.environ.get("SAP_DOWNLOAD_VERSION", "active").strip()

          # Accepted formats:
          # v1.1.2.ReadyForDeployment
          # v1.1.2-ReadyForDeployment
          # v1.1.2_ReadyForDeployment
          deployment_tag_pattern = re.compile(
              rf"v\d+\.\d+\.\d+[.\-_]{re.escape(deployment_marker)}"
          )

          with open("artifacts-response.json", "r", encoding="utf-8") as file:
              payload = json.load(file)

          artifacts = payload.get("d", {}).get("results", [])

          matched = []
          skipped = []

          for artifact in artifacts:
              artifact_id = artifact.get("Id")
              artifact_name = artifact.get("Name", artifact_id)
              artifact_version = artifact.get("Version")
              artifact_type = artifact.get("ArtifactType") or artifact.get("Type")

              searchable_fields = [
                  artifact.get("Version"),
                  artifact.get("Description"),
                  artifact.get("Name"),
                  artifact.get("Tags"),
                  artifact.get("Tag"),
                  artifact.get("Labels"),
                  artifact.get("CustomTags"),
                  artifact.get("Keywords"),
              ]

              searchable_text = " ".join(
                  str(field) for field in searchable_fields if field is not None
              )

              deployment_tag_match = deployment_tag_pattern.search(searchable_text)

              if not artifact_id:
                  skipped.append({
                      "reason": "Missing artifact ID",
                      "artifactVersion": artifact_version
                  })
                  continue

              if not deployment_tag_match:
                  skipped.append({
                      "id": artifact_id,
                      "name": artifact_name,
                      "artifactVersion": artifact_version,
                      "type": artifact_type,
                      "reason": "No valid deployment version tag found"
                  })
                  continue

              deployment_tag = deployment_tag_match.group(0)

              # Important:
              # Deployment tag is used for filtering and folder naming.
              # SAP download version is used in the actual CPI download URL.
              #
              # Recommended value is usually "active".
              # If you really want to use SAP-returned Version, set SAP_DOWNLOAD_VERSION input as blank manually.
              if sap_download_version_override:
                  sap_download_version = sap_download_version_override
              else:
                  sap_download_version = artifact_version or "active"

              matched.append({
                  "id": artifact_id,
                  "name": artifact_name,
                  "artifactVersionFromSAP": artifact_version,
                  "sapDownloadVersion": sap_download_version,
                  "deploymentTag": deployment_tag,
                  "type": artifact_type
              })

          with open("matched-iflows.json", "w", encoding="utf-8") as file:
              json.dump(matched, file, indent=2)

          with open("skipped-iflows.json", "w", encoding="utf-8") as file:
              json.dump(skipped, file, indent=2)

          print(f"Total artifacts from SAP: {len(artifacts)}")
          print(f"Matched iFlows: {len(matched)}")
          print(f"Skipped artifacts: {len(skipped)}")

          if matched:
              print("Matched iFlows:")
              for item in matched:
                  print(
                      f"- ID: {item['id']} | "
                      f"SAP API Version: {item['sapDownloadVersion']} | "
                      f"Deployment Tag: {item['deploymentTag']}"
                  )
          else:
              print("No iFlows found with allowed ReadyForDeployment version tag.")
          PY

          MATCH_COUNT=$(jq length matched-iflows.json)

          if [ "$MATCH_COUNT" -eq 0 ]; then
            echo "No matching iFlows found. Nothing to download."
            exit 0
          fi

      - name: Print matched iFlows before download
        shell: bash
        run: |
          set -euo pipefail

          echo "Matched iFlows selected for download:"
          jq -r '.[] | "ID: \(.id) | Name: \(.name) | SAP Download Version: \(.sapDownloadVersion) | Deployment Tag: \(.deploymentTag) | SAP Returned Version: \(.artifactVersionFromSAP)"' matched-iflows.json

      - name: Download matched iFlows from SAP BTP
        shell: bash
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          SAP_CPI_API_BASE_URL="${SAP_CPI_API_BASE_URL%/}"

          jq -c '.[]' matched-iflows.json | while read -r artifact; do
            IFLOW_ID=$(echo "$artifact" | jq -r '.id')
            IFLOW_NAME=$(echo "$artifact" | jq -r '.name')
            SAP_DOWNLOAD_VERSION_ITEM=$(echo "$artifact" | jq -r '.sapDownloadVersion')
            DEPLOYMENT_TAG=$(echo "$artifact" | jq -r '.deploymentTag')

            SAFE_ID=$(echo "$IFLOW_ID" | tr -cd '[:alnum:]_.-')
            SAFE_TAG=$(echo "$DEPLOYMENT_TAG" | tr -cd '[:alnum:]_.-')

            TARGET_PATH="$DOWNLOAD_DIR/$SAFE_ID/$SAFE_TAG"
            ZIP_FILE="$TARGET_PATH/${SAFE_ID}_${SAFE_TAG}.zip"
            ERROR_FILE="$TARGET_PATH/${SAFE_ID}_${SAFE_TAG}_sap_error.txt"

            mkdir -p "$TARGET_PATH"

            # Escape single quote for OData key predicate.
            ODATA_ID=$(printf "%s" "$IFLOW_ID" | sed "s/'/''/g")
            ODATA_VERSION=$(printf "%s" "$SAP_DOWNLOAD_VERSION_ITEM" | sed "s/'/''/g")

            DOWNLOAD_URL="$SAP_CPI_API_BASE_URL/api/v1/IntegrationDesigntimeArtifacts(Id='$ODATA_ID',Version='$ODATA_VERSION')/\$value"

            echo "------------------------------------------------------------"
            echo "Downloading iFlow"
            echo "ID                   : $IFLOW_ID"
            echo "Name                 : $IFLOW_NAME"
            echo "SAP Download Version : $SAP_DOWNLOAD_VERSION_ITEM"
            echo "Deployment Tag       : $DEPLOYMENT_TAG"
            echo "URL Pattern          : /api/v1/IntegrationDesigntimeArtifacts(Id='<ID>',Version='<VERSION>')/\$value"
            echo "------------------------------------------------------------"

            HTTP_CODE=$(curl -sS \
              --request GET "$DOWNLOAD_URL" \
              --header "Authorization: Bearer $SAP_ACCESS_TOKEN" \
              --header "Accept: application/zip" \
              --output "$ZIP_FILE" \
              --write-out "%{http_code}")

            echo "Download HTTP status: $HTTP_CODE"

            if [ "$HTTP_CODE" != "200" ]; then
              echo "ERROR: Download failed for iFlow: $IFLOW_ID"
              echo "Trying to capture SAP error response..."

              curl -sS \
                --request GET "$DOWNLOAD_URL" \
                --header "Authorization: Bearer $SAP_ACCESS_TOKEN" \
                --header "Accept: application/json" \
                --output "$ERROR_FILE" || true

              echo "SAP error response:"
              cat "$ERROR_FILE" || true

              rm -f "$ZIP_FILE"

              echo ""
              echo "Troubleshooting hints:"
              echo "1. If HTTP status is 501, check if SAP_CPI_API_BASE_URL is correct CPI API tenant URL."
              echo "2. Check whether SAP Download Version should be 'active'."
              echo "3. Check whether the artifact is really an Integration Flow artifact."
              echo "4. Check if the OAuth client has required Cloud Integration API roles."
              exit 1
            fi

            if [ ! -s "$ZIP_FILE" ]; then
              echo "ERROR: Downloaded ZIP is empty for iFlow: $IFLOW_ID"
              exit 1
            fi

            FILE_TYPE=$(file "$ZIP_FILE" || true)
            echo "Downloaded file type: $FILE_TYPE"

            if [ "$EXTRACT_ZIP" = "true" ]; then
              EXTRACT_PATH="$TARGET_PATH/extracted"
              rm -rf "$EXTRACT_PATH"
              mkdir -p "$EXTRACT_PATH"

              if unzip -tq "$ZIP_FILE" >/dev/null 2>&1; then
                unzip -q "$ZIP_FILE" -d "$EXTRACT_PATH"
                echo "ZIP extracted to: $EXTRACT_PATH"
              else
                echo "WARNING: Downloaded file is not a valid ZIP or cannot be extracted."
                echo "Keeping original file only: $ZIP_FILE"
              fi
            fi

            echo "Downloaded successfully: $ZIP_FILE"
          done

      - name: Create download manifest
        shell: bash
        run: |
          set -euo pipefail

          MANIFEST_FILE="$DOWNLOAD_DIR/download-manifest.json"

          jq \
            --arg downloadedAt "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg marker "$DEPLOYMENT_MARKER" \
            --arg targetBranch "$TARGET_BRANCH" \
            --arg sapDownloadVersion "$SAP_DOWNLOAD_VERSION" \
            '{
              downloadedAtUtc: $downloadedAt,
              targetBranch: $targetBranch,
              deploymentMarker: $marker,
              acceptedDeploymentTagFormats: [
                "vX.Y.Z." + $marker,
                "vX.Y.Z-" + $marker,
                "vX.Y.Z_" + $marker
              ],
              sapDownloadVersion: $sapDownloadVersion,
              artifacts: .
            }' matched-iflows.json > "$MANIFEST_FILE"

          echo "Download manifest created:"
          cat "$MANIFEST_FILE"

      - name: Commit and push downloaded iFlows
        shell: bash
        run: |
          set -euo pipefail

          git add "$DOWNLOAD_DIR"

          if git diff --staged --quiet; then
            echo "No changes detected. Nothing to commit."
            exit 0
          fi

          git commit -m "Download SAP BTP iFlows tagged $DEPLOYMENT_MARKER"
          git push origin "$TARGET_BRANCH"

          echo "Downloaded iFlows pushed to branch: $TARGET_BRANCH"
