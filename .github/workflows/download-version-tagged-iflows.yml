name: Download Version-Saved ReadyForDeployment iFlows from SAP BTP

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Feature branch where downloaded iFlows will be pushed"
        required: false
        default: "feature/btp-iflow-backup"

      deployment_marker:
        description: "Deployment marker used in SAP saved version"
        required: false
        default: "ReadyForDeployment"

  schedule:
    # Runs twice daily at 09:00 and 18:00 IST
    # GitHub cron uses UTC
    - cron: "30 3,12 * * *"

permissions:
  contents: write

env:
  TARGET_BRANCH: feature/btp-iflow-backup
  DEPLOYMENT_MARKER: ReadyForDeployment
  DOWNLOAD_DIR: btp-iflows
  EXTRACT_ZIP: "true"

jobs:
  download-ready-iflows:
    name: Download iFlows saved as vX.Y.Z.ReadyForDeployment
    runs-on: ubuntu-latest

    # Uncomment only if your secrets are stored under GitHub Environment secrets.
    # Replace dev with your actual environment name.
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve runtime inputs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET_BRANCH=${{ github.event.inputs.target_branch }}" >> "$GITHUB_ENV"
            echo "DEPLOYMENT_MARKER=${{ github.event.inputs.deployment_marker }}" >> "$GITHUB_ENV"
          fi

          echo "Target branch resolved: $TARGET_BRANCH"
          echo "Deployment marker resolved: $DEPLOYMENT_MARKER"

      - name: Validate required GitHub secrets
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          echo "Validating required secrets..."

          if [ -z "${SAP_BTP_TOKEN_URL:-}" ]; then
            echo "ERROR: SAP_BTP_TOKEN_URL secret is missing or empty."
            exit 1
          fi

          if [ -z "${SAP_BTP_OAUTH_CLIENT_ID:-}" ]; then
            echo "ERROR: SAP_BTP_OAUTH_CLIENT_ID secret is missing or empty."
            exit 1
          fi

          if [ -z "${SAP_BTP_OAUTH_CLIENT_SECRET:-}" ]; then
            echo "ERROR: SAP_BTP_OAUTH_CLIENT_SECRET secret is missing or empty."
            exit 1
          fi

          if [ -z "${SAP_CPI_API_BASE_URL:-}" ]; then
            echo "ERROR: SAP_CPI_API_BASE_URL secret is missing or empty."
            exit 1
          fi

          if [[ "$SAP_BTP_TOKEN_URL" != https://* ]]; then
            echo "ERROR: SAP_BTP_TOKEN_URL must start with https://"
            exit 1
          fi

          if [[ "$SAP_CPI_API_BASE_URL" != https://* ]]; then
            echo "ERROR: SAP_CPI_API_BASE_URL must start with https://"
            exit 1
          fi

          echo "All required secrets are configured."

      - name: Configure Git
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or switch to target feature branch
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin

          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH"; then
            echo "Remote branch exists: $TARGET_BRANCH"
            git checkout "$TARGET_BRANCH"
            git pull origin "$TARGET_BRANCH"
          else
            echo "Remote branch does not exist. Creating: $TARGET_BRANCH"
            git checkout -b "$TARGET_BRANCH"
          fi

      - name: Get SAP BTP OAuth token
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          SAP_BTP_TOKEN_URL="${SAP_BTP_TOKEN_URL%/}"

          if [[ "$SAP_BTP_TOKEN_URL" == */oauth/token ]]; then
            TOKEN_ENDPOINT="$SAP_BTP_TOKEN_URL"
          else
            TOKEN_ENDPOINT="$SAP_BTP_TOKEN_URL/oauth/token"
          fi

          echo "Requesting SAP OAuth token..."

          TOKEN_RESPONSE=$(curl -sS \
            --request POST "$TOKEN_ENDPOINT" \
            --user "$SAP_BTP_OAUTH_CLIENT_ID:$SAP_BTP_OAUTH_CLIENT_SECRET" \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data "grant_type=client_credentials" \
            --write-out "\nHTTP_CODE=%{http_code}")

          HTTP_CODE=$(echo "$TOKEN_RESPONSE" | sed -n 's/^HTTP_CODE=//p')
          BODY=$(echo "$TOKEN_RESPONSE" | sed '/^HTTP_CODE=/d')

          echo "Token HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Failed to get SAP OAuth token."
            echo "$BODY"
            exit 1
          fi

          ACCESS_TOKEN=$(echo "$BODY" | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "ERROR: access_token not found in token response."
            echo "$BODY"
            exit 1
          fi

          echo "::add-mask::$ACCESS_TOKEN"
          echo "SAP_ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"

          echo "SAP OAuth token generated successfully."

      - name: Fetch and filter iFlows saved as version vX.Y.Z.ReadyForDeployment
        shell: bash
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          SAP_CPI_API_BASE_URL="${SAP_CPI_API_BASE_URL%/}"

          mkdir -p "$DOWNLOAD_DIR"

          echo "Checking SAP CPI metadata..."

          METADATA_HTTP_CODE=$(curl -sS \
            --request GET "$SAP_CPI_API_BASE_URL/api/v1/\$metadata" \
            --header "Authorization: Bearer $SAP_ACCESS_TOKEN" \
            --header "Accept: application/xml" \
            --output metadata.xml \
            --write-out "%{http_code}")

          echo "Metadata HTTP status: $METADATA_HTTP_CODE"

          if [ "$METADATA_HTTP_CODE" != "200" ]; then
            echo "ERROR: Metadata endpoint failed."
            head -50 metadata.xml || true
            exit 1
          fi

          echo "Trying direct IntegrationDesigntimeArtifacts collection..."

          DIRECT_HTTP_CODE=$(curl -sS \
            --request GET "$SAP_CPI_API_BASE_URL/api/v1/IntegrationDesigntimeArtifacts?\$format=json" \
            --header "Authorization: Bearer $SAP_ACCESS_TOKEN" \
            --header "Accept: application/json" \
            --output artifacts-response.json \
            --write-out "%{http_code}")

          echo "Direct artifact collection HTTP status: $DIRECT_HTTP_CODE"

          if [ "$DIRECT_HTTP_CODE" = "200" ]; then
            echo "Direct IntegrationDesigntimeArtifacts collection is supported."
          else
            echo "Direct IntegrationDesigntimeArtifacts collection is not supported."
            echo "Trying package-based fallback..."
            echo "Direct response:"
            cat artifacts-response.json || true

            echo "Fetching IntegrationPackages..."

            PACKAGES_HTTP_CODE=$(curl -sS \
              --request GET "$SAP_CPI_API_BASE_URL/api/v1/IntegrationPackages?\$format=json" \
              --header "Authorization: Bearer $SAP_ACCESS_TOKEN" \
              --header "Accept: application/json" \
              --output packages-response.json \
              --write-out "%{http_code}")

            echo "IntegrationPackages HTTP status: $PACKAGES_HTTP_CODE"

            if [ "$PACKAGES_HTTP_CODE" != "200" ]; then
              echo "ERROR: Could not fetch IntegrationPackages."
              cat packages-response.json || true
              exit 1
            fi

            echo '{"d":{"results":[]}}' > artifacts-response.json

            echo "Fetching artifacts from each package..."

            jq -r '.d.results[]?.Id' packages-response.json | while read -r PACKAGE_ID; do
              if [ -z "$PACKAGE_ID" ] || [ "$PACKAGE_ID" = "null" ]; then
                continue
              fi

              echo "Fetching artifacts for package: $PACKAGE_ID"

              SAFE_PACKAGE_FILE=$(echo "$PACKAGE_ID" | tr -cd '[:alnum:]_.-')
              PACKAGE_RESPONSE_FILE="package-artifacts-${SAFE_PACKAGE_FILE}.json"

              ODATA_PACKAGE_ID=$(printf "%s" "$PACKAGE_ID" | sed "s/'/''/g")

              PACKAGE_ARTIFACT_HTTP_CODE=$(curl -sS \
                --request GET "$SAP_CPI_API_BASE_URL/api/v1/IntegrationPackages('$ODATA_PACKAGE_ID')/IntegrationDesigntimeArtifacts?\$format=json" \
                --header "Authorization: Bearer $SAP_ACCESS_TOKEN" \
                --header "Accept: application/json" \
                --output "$PACKAGE_RESPONSE_FILE" \
                --write-out "%{http_code}")

              echo "Package artifact HTTP status for $PACKAGE_ID: $PACKAGE_ARTIFACT_HTTP_CODE"

              if [ "$PACKAGE_ARTIFACT_HTTP_CODE" = "200" ]; then
                jq -s '
                  {
                    d: {
                      results: (
                        (.[0].d.results // []) + (.[1].d.results // [])
                      )
                    }
                  }
                ' artifacts-response.json "$PACKAGE_RESPONSE_FILE" > combined-artifacts.json

                mv combined-artifacts.json artifacts-response.json
              else
                echo "WARNING: Could not fetch artifacts for package: $PACKAGE_ID"
                cat "$PACKAGE_RESPONSE_FILE" || true
              fi
            done
          fi

          echo "Total fetched artifacts:"
          jq '.d.results | length' artifacts-response.json

          echo "Filtering ONLY by SAP saved Version field."
          echo "Accepted version format:"
          echo "vX.Y.Z.$DEPLOYMENT_MARKER"

          python3 << 'PY'
          import json
          import os
          import re

          deployment_marker = os.environ.get("DEPLOYMENT_MARKER", "ReadyForDeployment")

          # Strict match ONLY on SAP saved Version field:
          # v1.1.2.ReadyForDeployment
          version_pattern = re.compile(
              rf"^v\d+\.\d+\.\d+\.{re.escape(deployment_marker)}$"
          )

          with open("artifacts-response.json", "r", encoding="utf-8") as file:
              payload = json.load(file)

          artifacts = payload.get("d", {}).get("results", [])

          matched = []
          skipped = []

          for artifact in artifacts:
              artifact_id = artifact.get("Id")
              artifact_name = artifact.get("Name", artifact_id)
              artifact_version = artifact.get("Version")
              package_id = artifact.get("PackageId")
              artifact_type = artifact.get("ArtifactType") or artifact.get("Type")

              if not artifact_id:
                  skipped.append({
                      "reason": "Missing artifact ID",
                      "versionFromSAP": artifact_version
                  })
                  continue

              if not artifact_version:
                  skipped.append({
                      "id": artifact_id,
                      "name": artifact_name,
                      "packageId": package_id,
                      "versionFromSAP": artifact_version,
                      "type": artifact_type,
                      "reason": "Missing SAP saved version"
                  })
                  continue

              # Important:
              # Match ONLY the SAP artifact Version field.
              # Do NOT check Name, Description, Tags, Labels, or Keywords.
              if not version_pattern.match(artifact_version):
                  skipped.append({
                      "id": artifact_id,
                      "name": artifact_name,
                      "packageId": package_id,
                      "versionFromSAP": artifact_version,
                      "type": artifact_type,
                      "reason": "SAP saved version does not match vX.Y.Z.ReadyForDeployment"
                  })
                  continue

              matched.append({
                  "id": artifact_id,
                  "name": artifact_name,
                  "packageId": package_id,
                  "versionFromSAP": artifact_version,

                  # Since iFlow is saved as version vX.Y.Z.ReadyForDeployment,
                  # use the same exact SAP Version in download URL.
                  "sapDownloadVersion": artifact_version,

                  "deploymentTag": artifact_version,
                  "type": artifact_type
              })

          with open("matched-iflows.json", "w", encoding="utf-8") as file:
              json.dump(matched, file, indent=2)

          with open("skipped-iflows.json", "w", encoding="utf-8") as file:
              json.dump(skipped, file, indent=2)

          print(f"Total artifacts fetched: {len(artifacts)}")
          print(f"Matched iFlows: {len(matched)}")
          print(f"Skipped artifacts: {len(skipped)}")

          if matched:
              print("Matched iFlows:")
              for item in matched:
                  print(
                      f"- ID: {item['id']} | "
                      f"Name: {item['name']} | "
                      f"Package: {item.get('packageId')} | "
                      f"SAP Saved Version: {item['versionFromSAP']} | "
                      f"SAP Download Version: {item['sapDownloadVersion']}"
                  )
          else:
              print("No iFlows found with SAP saved version vX.Y.Z.ReadyForDeployment.")
          PY

          MATCH_COUNT=$(jq length matched-iflows.json)

          if [ "$MATCH_COUNT" -eq 0 ]; then
            echo "No matching iFlows found with SAP saved version vX.Y.Z.$DEPLOYMENT_MARKER."
            echo "Nothing to download."
            exit 0
          fi

      - name: Print matched iFlows before download
        shell: bash
        run: |
          set -euo pipefail

          echo "Matched iFlows selected for download:"
          jq -r '.[] | "ID: \(.id) | Name: \(.name) | Package: \(.packageId) | SAP Saved Version: \(.versionFromSAP) | SAP Download Version: \(.sapDownloadVersion)"' matched-iflows.json

      - name: Download matched iFlows from SAP BTP
        shell: bash
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          SAP_CPI_API_BASE_URL="${SAP_CPI_API_BASE_URL%/}"

          jq -c '.[]' matched-iflows.json | while read -r artifact; do
            IFLOW_ID=$(echo "$artifact" | jq -r '.id')
            IFLOW_NAME=$(echo "$artifact" | jq -r '.name')
            PACKAGE_ID=$(echo "$artifact" | jq -r '.packageId // "NA"')
            SAP_DOWNLOAD_VERSION_ITEM=$(echo "$artifact" | jq -r '.sapDownloadVersion')
            DEPLOYMENT_TAG=$(echo "$artifact" | jq -r '.deploymentTag')

            SAFE_ID=$(echo "$IFLOW_ID" | tr -cd '[:alnum:]_.-')
            SAFE_VERSION=$(echo "$SAP_DOWNLOAD_VERSION_ITEM" | tr -cd '[:alnum:]_.-')

            TARGET_PATH="$DOWNLOAD_DIR/$SAFE_ID/$SAFE_VERSION"
            ZIP_FILE="$TARGET_PATH/${SAFE_ID}_${SAFE_VERSION}.zip"
            ERROR_FILE="$TARGET_PATH/${SAFE_ID}_${SAFE_VERSION}_sap_error.txt"

            mkdir -p "$TARGET_PATH"

            ODATA_ID=$(printf "%s" "$IFLOW_ID" | sed "s/'/''/g")
            ODATA_VERSION=$(printf "%s" "$SAP_DOWNLOAD_VERSION_ITEM" | sed "s/'/''/g")

            DOWNLOAD_URL="$SAP_CPI_API_BASE_URL/api/v1/IntegrationDesigntimeArtifacts(Id='$ODATA_ID',Version='$ODATA_VERSION')/\$value"

            echo "------------------------------------------------------------"
            echo "Downloading iFlow"
            echo "ID                   : $IFLOW_ID"
            echo "Name                 : $IFLOW_NAME"
            echo "Package              : $PACKAGE_ID"
            echo "SAP Saved Version    : $SAP_DOWNLOAD_VERSION_ITEM"
            echo "Deployment Tag       : $DEPLOYMENT_TAG"
            echo "URL Pattern          : /api/v1/IntegrationDesigntimeArtifacts(Id='<ID>',Version='<VERSION>')/\$value"
            echo "------------------------------------------------------------"

            HTTP_CODE=$(curl -sS \
              --request GET "$DOWNLOAD_URL" \
              --header "Authorization: Bearer $SAP_ACCESS_TOKEN" \
              --header "Accept: application/zip" \
              --output "$ZIP_FILE" \
              --write-out "%{http_code}")

            echo "Download HTTP status: $HTTP_CODE"

            if [ "$HTTP_CODE" != "200" ]; then
              echo "ERROR: Download failed for iFlow: $IFLOW_ID"

              curl -sS \
                --request GET "$DOWNLOAD_URL" \
                --header "Authorization: Bearer $SAP_ACCESS_TOKEN" \
                --header "Accept: application/json" \
                --output "$ERROR_FILE" || true

              echo "SAP error response:"
              cat "$ERROR_FILE" || true

              rm -f "$ZIP_FILE"

              echo ""
              echo "Troubleshooting hints:"
              echo "1. Confirm this exact SAP saved version exists: $SAP_DOWNLOAD_VERSION_ITEM"
              echo "2. Confirm artifact is an actual Integration Flow."
              echo "3. Confirm OAuth client has required Cloud Integration API roles."
              echo "4. Confirm SAP_CPI_API_BASE_URL is the CPI API tenant URL."
              exit 1
            fi

            if [ ! -s "$ZIP_FILE" ]; then
              echo "ERROR: Downloaded ZIP is empty for iFlow: $IFLOW_ID"
              exit 1
            fi

            echo "Downloaded file details:"
            file "$ZIP_FILE" || true

            if [ "$EXTRACT_ZIP" = "true" ]; then
              EXTRACT_PATH="$TARGET_PATH/extracted"
              rm -rf "$EXTRACT_PATH"
              mkdir -p "$EXTRACT_PATH"

              if unzip -tq "$ZIP_FILE" >/dev/null 2>&1; then
                unzip -q "$ZIP_FILE" -d "$EXTRACT_PATH"
                echo "ZIP extracted to: $EXTRACT_PATH"
              else
                echo "WARNING: Downloaded file is not a valid ZIP. Keeping ZIP only."
              fi
            fi

            echo "Downloaded successfully: $ZIP_FILE"
          done

      - name: Create download manifest
        shell: bash
        run: |
          set -euo pipefail

          MANIFEST_FILE="$DOWNLOAD_DIR/download-manifest.json"

          jq \
            --arg downloadedAt "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg marker "$DEPLOYMENT_MARKER" \
            --arg targetBranch "$TARGET_BRANCH" \
            '{
              downloadedAtUtc: $downloadedAt,
              targetBranch: $targetBranch,
              deploymentMarker: $marker,
              acceptedDeploymentVersionFormat: "vX.Y.Z." + $marker,
              versionMatchRule: "Only SAP artifact Version field is checked. Name, Description, Tags, Labels, and Keywords are ignored.",
              artifacts: .
            }' matched-iflows.json > "$MANIFEST_FILE"

          echo "Download manifest created:"
          cat "$MANIFEST_FILE"

      - name: Commit and push downloaded iFlows
        shell: bash
        run: |
          set -euo pipefail

          git add "$DOWNLOAD_DIR"

          if git diff --staged --quiet; then
            echo "No changes detected. Nothing to commit."
            exit 0
          fi

          git commit -m "Download SAP BTP iFlows saved as version vX.Y.Z.$DEPLOYMENT_MARKER"
          git push origin "$TARGET_BRANCH"

          echo "Downloaded iFlows pushed to branch: $TARGET_BRANCH"
