name: Auto PR from feature to develop

on:
  workflow_run:
    workflows: ["Download ReadyForDeployment iFlows from SAP BTP"]
    types:
      - completed

  workflow_dispatch:
    inputs:
      pr_reason:
        description: "Manual PR creation reason"
        required: false
        default: "Manual QA deployment trigger"

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: auto-pr-develop
  cancel-in-progress: false

env:
  FEATURE_BRANCH: feature
  DEVELOP_BRANCH: develop
  DOWNLOAD_DIR: btp-iflows
  DEPLOYMENT_MARKER: ReadyForDeployment

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Verify trigger from feature branch
  # ═══════════════════════════════════════════════════════════════
  verify-trigger:
    name: Verify trigger from feature branch
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    outputs:
      should_proceed: ${{ steps.check.outputs.proceed }}

    steps:
      - name: Verify source branch
        id: check
        shell: bash
        run: |
          set -euo pipefail

          echo "═══════════════════════════════════════════════════════════"
          echo "🔍 Verifying trigger context"
          echo "═══════════════════════════════════════════════════════════"

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SOURCE_BRANCH="${{ github.event.workflow_run.head_branch }}"

            if [ "$SOURCE_BRANCH" != "$FEATURE_BRANCH" ]; then
              echo "::error::Trigger came from '$SOURCE_BRANCH', not '$FEATURE_BRANCH'"
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi

            echo "✅ Trigger verified from $FEATURE_BRANCH branch"
          else
            echo "🖐️  Manual trigger accepted"
          fi

          echo "proceed=true" >> "$GITHUB_OUTPUT"

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: Detect new iFlows with detailed version info
  # ═══════════════════════════════════════════════════════════════
  detect-iflows:
    name: Detect new iFlows with version details
    needs: verify-trigger
    if: needs.verify-trigger.outputs.should_proceed == 'true'
    runs-on: ubuntu-latest

    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      iflow_count: ${{ steps.detect.outputs.iflow_count }}
      iflow_details_json: ${{ steps.detect.outputs.iflow_details_json }}
      iflow_markdown: ${{ steps.detect.outputs.iflow_markdown }}
      iflow_html_table: ${{ steps.detect.outputs.iflow_html_table }}
      package_summary: ${{ steps.detect.outputs.package_summary }}
      feature_sha: ${{ steps.detect.outputs.feature_sha }}
      feature_short_sha: ${{ steps.detect.outputs.feature_short_sha }}

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.FEATURE_BRANCH }}
          fetch-depth: 50
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Analyze and collect iFlow details
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          echo "═══════════════════════════════════════════════════════════"
          echo "🔍 Analyzing feature branch iFlows"
          echo "═══════════════════════════════════════════════════════════"

          FEATURE_SHA=$(git rev-parse HEAD)
          FEATURE_SHORT_SHA="${FEATURE_SHA:0:7}"
          
          git fetch origin "$DEVELOP_BRANCH"
          MERGE_BASE=$(git merge-base HEAD "origin/$DEVELOP_BRANCH")

          echo "Feature HEAD  : $FEATURE_SHORT_SHA"
          echo "Merge base    : ${MERGE_BASE:0:7}"
          echo ""

          echo "feature_sha=$FEATURE_SHA" >> "$GITHUB_OUTPUT"
          echo "feature_short_sha=$FEATURE_SHORT_SHA" >> "$GITHUB_OUTPUT"

          # Find NEW iFlow ZIPs
          NEW_ZIPS=$(git diff --name-only --diff-filter=A "$MERGE_BASE" HEAD -- "$DOWNLOAD_DIR/**/*.zip" 2>/dev/null || true)
          IFLOW_COUNT=$(echo "$NEW_ZIPS" | grep -c . || echo 0)

          echo "📦 New iFlows detected: $IFLOW_COUNT"

          if [ "$IFLOW_COUNT" -eq 0 ]; then
            echo "::notice::No new iFlows to deploy"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "iflow_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Collect detailed info for each iFlow
          echo "[]" > iflow-details.json
          MARKDOWN_LIST=""
          HTML_ROWS=""
          declare -A PACKAGE_COUNT

          while IFS= read -r zip; do
            [ -z "$zip" ] && continue

            IFLOW_ID=$(basename "$(dirname "$(dirname "$zip")")")
            VERSION=$(basename "$(dirname "$zip")")
            
            # Extract package info from extracted MANIFEST if available
            EXTRACTED_DIR=$(dirname "$zip")/extracted
            PACKAGE_ID="Unknown"
            IFLOW_NAME="$IFLOW_ID"
            
            if [ -f "$EXTRACTED_DIR/META-INF/MANIFEST.MF" ]; then
              PKG_LINE=$(grep -i "^Bundle-Name:\|^Bundle-SymbolicName:\|^SAP-BundleType:\|^OriginBundleSymbolicName:" "$EXTRACTED_DIR/META-INF/MANIFEST.MF" 2>/dev/null | head -1 || echo "")
              if [ -n "$PKG_LINE" ]; then
                IFLOW_NAME=$(echo "$PKG_LINE" | cut -d: -f2- | tr -d ' \r')
              fi
            fi

            # Get file size
            ZIP_SIZE=$(du -h "$zip" 2>/dev/null | cut -f1 || echo "N/A")

            # Get file modification time
            MOD_TIME=$(date -u -r "$zip" +"%Y-%m-%d %H:%M UTC" 2>/dev/null || date -u +"%Y-%m-%d %H:%M UTC")

            # Extract version components
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)

            echo "  📄 $IFLOW_ID | v$VERSION | Size: $ZIP_SIZE"

            # Track package counts
            PACKAGE_COUNT[$PACKAGE_ID]=$((${PACKAGE_COUNT[$PACKAGE_ID]:-0} + 1))

            # Build JSON entry
            jq --arg id "$IFLOW_ID" \
               --arg name "$IFLOW_NAME" \
               --arg ver "$VERSION" \
               --arg pkg "$PACKAGE_ID" \
               --arg size "$ZIP_SIZE" \
               --arg mtime "$MOD_TIME" \
               --arg major "$MAJOR" \
               --arg minor "$MINOR" \
               --arg patch "$PATCH" \
               --arg zip "$zip" \
               '. + [{
                 id: $id,
                 name: $name,
                 version: $ver,
                 versionMajor: ($major | tonumber),
                 versionMinor: ($minor | tonumber),
                 versionPatch: ($patch | tonumber),
                 package: $pkg,
                 zipFile: $zip,
                 zipSize: $size,
                 downloadedAt: $mtime
               }]' iflow-details.json > tmp.json
            mv tmp.json iflow-details.json

            # Build markdown line
            MARKDOWN_LIST="${MARKDOWN_LIST}| \`${IFLOW_ID}\` | \`${VERSION}\` | ${ZIP_SIZE} | ${MOD_TIME} |"$'\n'

            # Build HTML table row for email
            HTML_ROWS="${HTML_ROWS}<tr>
              <td style='padding: 12px; border: 1px solid #ddd;'><code style='background: #f6f8fa; padding: 2px 6px; border-radius: 3px;'>${IFLOW_ID}</code></td>
              <td style='padding: 12px; border: 1px solid #ddd; text-align: center;'>
                <span style='background: #0366d6; color: white; padding: 4px 10px; border-radius: 12px; font-family: monospace; font-size: 0.9em;'>v${VERSION}</span>
              </td>
              <td style='padding: 12px; border: 1px solid #ddd; text-align: center; color: #666;'>${ZIP_SIZE}</td>
              <td style='padding: 12px; border: 1px solid #ddd; color: #666; font-size: 0.9em;'>${MOD_TIME}</td>
            </tr>"

          done <<< "$NEW_ZIPS"

          # Build package summary
          PACKAGE_SUMMARY=""
          for pkg in "${!PACKAGE_COUNT[@]}"; do
            PACKAGE_SUMMARY="${PACKAGE_SUMMARY}- **${pkg}**: ${PACKAGE_COUNT[$pkg]} iFlow(s)"$'\n'
          done

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "iflow_count=$IFLOW_COUNT" >> "$GITHUB_OUTPUT"

          # Multi-line outputs
          {
            echo "iflow_details_json<<DETAILS_EOF"
            cat iflow-details.json
            echo "DETAILS_EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "iflow_markdown<<MARKDOWN_EOF"
            echo "$MARKDOWN_LIST"
            echo "MARKDOWN_EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "iflow_html_table<<HTML_EOF"
            echo "$HTML_ROWS"
            echo "HTML_EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "package_summary<<PKG_EOF"
            echo "$PACKAGE_SUMMARY"
            echo "PKG_EOF"
          } >> "$GITHUB_OUTPUT"

          # Save detailed JSON as artifact for later steps
          cat iflow-details.json | jq .

          echo ""
          echo "✅ Detection complete"

      - name: Upload iFlow details artifact
        uses: actions/upload-artifact@v4
        with:
          name: iflow-deployment-details
          path: iflow-details.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: Create empty-commit PR with rich metadata
  # ═══════════════════════════════════════════════════════════════
  create-pr:
    name: Create PR with version details
    needs: [verify-trigger, detect-iflows]
    if: needs.detect-iflows.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    outputs:
      pr_number: ${{ steps.create_pr.outputs.pr_number }}
      pr_url: ${{ steps.create_pr.outputs.pr_url }}
      trigger_branch: ${{ steps.create_branch.outputs.trigger_branch }}

    steps:
      - name: Checkout develop branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEVELOP_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create empty trigger branch
        id: create_branch
        shell: bash
        run: |
          set -euo pipefail

          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          IFLOW_COUNT="${{ needs.detect-iflows.outputs.iflow_count }}"
