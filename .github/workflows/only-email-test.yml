name: Download ReadyForDeployment iFlows from SAP BTP

on:
  workflow_dispatch:
  # NOTE: No push trigger - runs ONLY manually.
  # Developers push collections to btp-iflows/test/ without triggering runs.

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: download-ready-iflows-feature
  cancel-in-progress: false

env:
  TARGET_BRANCH: feature
  DEPLOYMENT_MARKER: ReadyForDeployment
  DOWNLOAD_DIR: btp-iflows
  EXTRACT_ZIP: "true"
  VERSION_REGEX: '^[0-9]+\.[0-9]+\.[0-9]+\.ReadyForDeployment$'
  CPILINT_RULES: cpilint-rules.xml
  CPILINT_VERSION: "1.1.0"

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Download iFlows from SAP CPI
  # ═══════════════════════════════════════════════════════════════
  download-ready-iflows:
    name: Download X.Y.Z.ReadyForDeployment iFlows from SAP CPI
    runs-on: ubuntu-latest
    environment: dev

    outputs:
      skip_download: ${{ steps.set_output.outputs.skip_download }}

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Validate configuration and secrets
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          echo "Configuration"
          echo "Target branch     : $TARGET_BRANCH"
          echo "Deployment marker : $DEPLOYMENT_MARKER"
          echo "Download dir      : $DOWNLOAD_DIR"

          check_secret() {
            local name="$1" value="$2" prefix="${3:-}"
            if [ -z "${value:-}" ]; then
              echo "ERROR: $name is missing or empty."
              exit 1
            fi
            if [ -n "$prefix" ] && [ "${value#$prefix}" = "$value" ]; then
              echo "ERROR: $name must start with $prefix"
              exit 1
            fi
          }

          check_secret "SAP_BTP_TOKEN_URL" "$SAP_BTP_TOKEN_URL" "https://"
          check_secret "SAP_BTP_OAUTH_CLIENT_ID" "$SAP_BTP_OAUTH_CLIENT_ID"
          check_secret "SAP_BTP_OAUTH_CLIENT_SECRET" "$SAP_BTP_OAUTH_CLIENT_SECRET"
          check_secret "SAP_CPI_API_BASE_URL" "$SAP_CPI_API_BASE_URL" "https://"

          echo "All secrets validated."

      - name: Setup Git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Git configured. On branch: $TARGET_BRANCH"

      - name: Get SAP BTP OAuth token
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          TOKEN_URL="${SAP_BTP_TOKEN_URL%/}"
          [ "${TOKEN_URL%/oauth/token}" = "$TOKEN_URL" ] && TOKEN_URL="$TOKEN_URL/oauth/token"

          echo "Requesting SAP OAuth token..."

          RESPONSE=$(curl -sS \
            -w "\nHTTP_CODE=%{http_code}" \
            -X POST "$TOKEN_URL" \
            -u "$SAP_BTP_OAUTH_CLIENT_ID:$SAP_BTP_OAUTH_CLIENT_SECRET" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials")

          HTTP_CODE=$(echo "$RESPONSE" | sed -n 's/^HTTP_CODE=//p')
          BODY=$(echo "$RESPONSE" | sed '/^HTTP_CODE=/d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Token request failed (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi

          TOKEN=$(echo "$BODY" | jq -r '.access_token // empty')
          [ -z "$TOKEN" ] && { echo "No access_token in response"; exit 1; }

          echo "::add-mask::$TOKEN"
          echo "SAP_ACCESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "Token obtained."

      - name: Discover matching iFlows from SAP CPI
        shell: bash
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          API_BASE="${SAP_CPI_API_BASE_URL%/}"
          mkdir -p "$DOWNLOAD_DIR"

          cpi_get() {
            local url="$1" output="$2"
            curl -sS -w "%{http_code}" \
              -X GET "$url" \
              -H "Authorization: Bearer $SAP_ACCESS_TOKEN" \
              -H "Accept: application/json" \
              -o "$output"
          }

          echo "Fetching IntegrationPackages..."
          HTTP_CODE=$(cpi_get "$API_BASE/api/v1/IntegrationPackages?\$format=json" packages.json)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to fetch packages (HTTP $HTTP_CODE)"
            cat packages.json
            exit 1
          fi

          echo '{"d":{"results":[]}}' > all-artifacts.json

          jq -r '.d.results[]?.Id' packages.json | while read -r PKG_ID; do
            [ -z "$PKG_ID" ] || [ "$PKG_ID" = "null" ] && continue

            ODATA_PKG_ID=$(printf "%s" "$PKG_ID" | sed "s/'/''/g")
            PKG_FILE="pkg-$(echo "$PKG_ID" | tr -cd '[:alnum:]_.-').json"

            HTTP_CODE=$(cpi_get \
              "$API_BASE/api/v1/IntegrationPackages('$ODATA_PKG_ID')/IntegrationDesigntimeArtifacts?\$format=json" \
              "$PKG_FILE")

            if [ "$HTTP_CODE" = "200" ]; then
              jq -s '{d:{results:((.[0].d.results // []) + (.[1].d.results // []))}}' \
                all-artifacts.json "$PKG_FILE" > merged.json
              mv merged.json all-artifacts.json
              echo "$PKG_ID"
            else
              echo "Skipped $PKG_ID (HTTP $HTTP_CODE)"
            fi
          done

          TOTAL=$(jq '.d.results | length' all-artifacts.json)
          echo "Total artifacts discovered: $TOTAL"

          jq --arg pattern "$VERSION_REGEX" '
            [.d.results[]
              | select(
                  .Id != null
                  and (.Version | type == "string")
                  and (.Version | test($pattern))
                )
              | {
                  id: .Id,
                  packageId: .PackageId,
                  savedVersion: .Version
                }
            ]
          ' all-artifacts.json > selected-iflows.json

          MATCHED=$(jq length selected-iflows.json)
          echo "iFlows matching X.Y.Z.$DEPLOYMENT_MARKER: $MATCHED"
          jq -r '.[] | "\(.id) | \(.packageId) | v\(.savedVersion)"' selected-iflows.json

          if [ "$MATCHED" -eq 0 ]; then
            echo "::notice title=No matching iFlows::No iFlows found with version X.Y.Z.$DEPLOYMENT_MARKER"
            echo "SKIP_DOWNLOAD=true" >> "$GITHUB_ENV"
          fi

      - name: Filter out already downloaded iFlows
        if: env.SKIP_DOWNLOAD != 'true'
        shell: bash
        run: |
          set -euo pipefail

          jq -c '.[]' selected-iflows.json > items.txt
          echo "[]" > new-iflows.json
          NEW_COUNT=0
          EXISTING_COUNT=0

          while IFS= read -r item; do
            IFLOW_ID=$(echo "$item" | jq -r '.id')
            VERSION=$(echo "$item" | jq -r '.savedVersion')
            SAFE_ID=$(echo "$IFLOW_ID" | tr -cd '[:alnum:]_.-')
            SAFE_VER=$(echo "$VERSION" | tr -cd '[:alnum:]_.-')

            if [ -f "$DOWNLOAD_DIR/$SAFE_ID/$SAFE_VER/${SAFE_ID}_${SAFE_VER}.zip" ]; then
              echo "Already exists: $IFLOW_ID v$VERSION"
              EXISTING_COUNT=$((EXISTING_COUNT + 1))
            else
              echo "New: $IFLOW_ID v$VERSION"
              echo "$item" | jq -s '.' | jq -s '.[0] + .[1]' new-iflows.json - > tmp.json
              mv tmp.json new-iflows.json
              NEW_COUNT=$((NEW_COUNT + 1))
            fi
          done < items.txt

          mv new-iflows.json selected-iflows.json

          echo "Existing: $EXISTING_COUNT | New: $NEW_COUNT"

          if [ "$NEW_COUNT" -eq 0 ]; then
            echo "::notice title=No new iFlows::All discovered iFlows already exist in the branch."
            echo "SKIP_DOWNLOAD=true" >> "$GITHUB_ENV"
          fi

      - name: Download new iFlows from SAP CPI
        if: env.SKIP_DOWNLOAD != 'true'
        shell: bash
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          API_BASE="${SAP_CPI_API_BASE_URL%/}"

          jq -c '.[]' selected-iflows.json | while read -r item; do
            IFLOW_ID=$(echo "$item" | jq -r '.id')
            VERSION=$(echo "$item" | jq -r '.savedVersion')

            SAFE_ID=$(echo "$IFLOW_ID" | tr -cd '[:alnum:]_.-')
            SAFE_VER=$(echo "$VERSION" | tr -cd '[:alnum:]_.-')
            TARGET_PATH="$DOWNLOAD_DIR/$SAFE_ID/$SAFE_VER"
            ZIP_FILE="$TARGET_PATH/${SAFE_ID}_${SAFE_VER}.zip"

            mkdir -p "$TARGET_PATH"

            ODATA_ID=$(printf "%s" "$IFLOW_ID" | sed "s/'/''/g")
            ODATA_VER=$(printf "%s" "$VERSION" | sed "s/'/''/g")
            URL="$API_BASE/api/v1/IntegrationDesigntimeArtifacts(Id='$ODATA_ID',Version='$ODATA_VER')/\$value"

            echo "$IFLOW_ID | v$VERSION"

            HTTP_CODE=$(curl -sS \
              --connect-timeout 10 \
              --max-time 90 \
              -w "%{http_code}" \
              -X GET "$URL" \
              -H "Authorization: Bearer $SAP_ACCESS_TOKEN" \
              -H "Accept: application/zip" \
              -o "$ZIP_FILE")

            if [ "$HTTP_CODE" = "200" ] && [ -s "$ZIP_FILE" ]; then
              echo "Downloaded ($HTTP_CODE)"

              if [ "$EXTRACT_ZIP" = "true" ]; then
                EXTRACT_PATH="$TARGET_PATH/extracted"
                rm -rf "$EXTRACT_PATH"
                mkdir -p "$EXTRACT_PATH"
                if unzip -tq "$ZIP_FILE" >/dev/null 2>&1; then
                  unzip -q "$ZIP_FILE" -d "$EXTRACT_PATH"
                  echo "Extracted"
                else
                  echo "Invalid ZIP, keeping raw file only"
                fi
              fi
            else
              echo "Failed (HTTP $HTTP_CODE)"
              rm -f "$ZIP_FILE"
              rmdir "$TARGET_PATH" 2>/dev/null || true
            fi
          done

          echo "Total ZIPs in $DOWNLOAD_DIR: $(find "$DOWNLOAD_DIR" -name "*.zip" | wc -l)"

      - name: Set download outcome output
        id: set_output
        if: always()
        shell: bash
        run: |
          echo "skip_download=${SKIP_DOWNLOAD:-false}" >> "$GITHUB_OUTPUT"

      - name: Commit and push downloaded iFlows
        if: env.SKIP_DOWNLOAD != 'true'
        shell: bash
        run: |
          set -euo pipefail

          git add "$DOWNLOAD_DIR"

          if git diff --staged --quiet; then
            echo "::notice title=Nothing to commit::No new files were staged."
            exit 0
          fi

          git commit -m "Download SAP BTP iFlows (X.Y.Z.$DEPLOYMENT_MARKER)"

          git fetch origin "$TARGET_BRANCH"
          if ! git pull --rebase origin "$TARGET_BRANCH"; then
            echo "Rebase conflict detected"
            git rebase --abort || true
            exit 1
          fi

          git push origin "$TARGET_BRANCH"
          echo "Pushed to branch: $TARGET_BRANCH"

      - name: Report clean run
        if: env.SKIP_DOWNLOAD == 'true'
        shell: bash
        run: |
          echo "::notice title=Success::All iFlows are already downloaded. Nothing new."
 # ═══════════════════════════════════════════════════════════════
  # JOB 2: CPILint — runs on LATEST (new) iFlows; writes passed-list
  # ═══════════════════════════════════════════════════════════════
  run-cpilint:
    name: CPILint static analysis
    needs: download-ready-iflows
    if: needs.download-ready-iflows.outputs.skip_download != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install CPILint (vendored)
        shell: bash
        run: |
          set -euo pipefail
          [ ! -f "$CPILINT_RULES" ] && { echo "::error::$CPILINT_RULES not found"; exit 1; }

          VENDORED="tools/cpilint-${CPILINT_VERSION}.zip"
          if [ ! -f "$VENDORED" ]; then
            echo "::error title=CPILint missing::Vendored $VENDORED not found in repo."
            echo "Add the CPILint zip to tools/ and commit it."
            exit 1
          fi

          unzip -q "$VENDORED" -d cpilint-tool
          CPILINT_BIN=$(find cpilint-tool -name "cpilint" -type f | head -1)
          chmod +x "$CPILINT_BIN"
          echo "CPILINT_BIN=$CPILINT_BIN" >> "$GITHUB_ENV"
          echo "Using vendored CPILint: $VENDORED"

      - name: Run CPILint 
        env:
          DOWNLOAD_DIR: ${{ env.DOWNLOAD_DIR }}
        shell: bash
        run: |
          set -uo pipefail

          NEW_ZIPS=$(git diff --name-only --diff-filter=A HEAD^ HEAD -- "$DOWNLOAD_DIR/**/*.zip" 2>/dev/null || true)
          : > failure-details.txt
          : > passed-list.txt
          : > cpilint-new-iflows.txt      # ALL new iFlows (for Postman handoff)

          if [ -z "$NEW_ZIPS" ]; then
            echo "No new ZIPs to lint."
            exit 0
          fi

          echo "iFlows to lint (all rules from $CPILINT_RULES):"
          echo "$NEW_ZIPS"

          TOTAL_PASSED=0
          TOTAL_FAILED=0

          while IFS= read -r zip; do
            [ -z "$zip" ] && continue
            [ ! -f "$zip" ] && continue
            IFLOW_ID=$(basename "$(dirname "$(dirname "$zip")")")
            VERSION=$(basename "$(dirname "$zip")")

            # Record EVERY new iFlow for Postman (pass or fail - CPILint doesn't gate)
            echo "${IFLOW_ID}|${VERSION}" >> cpilint-new-iflows.txt

            echo "════════════════════════════════════════"
            echo "Linting: $IFLOW_ID v$VERSION"

            set +e
            "$CPILINT_BIN" -rules "$CPILINT_RULES" -files "$zip" > "cpilint-${IFLOW_ID}.log" 2>&1
            CPILINT_EXIT=$?
            set -e

            cat "cpilint-${IFLOW_ID}.log"
            echo "DEBUG: CPILint exit code = $CPILINT_EXIT"

            if [ "$CPILINT_EXIT" -eq 2 ]; then
              # Rules file invalid - tooling error. Report but DO NOT block.
              echo "::warning title=CPILint rules file invalid::Check $CPILINT_RULES. Continuing (advisory)."
              echo "${IFLOW_ID}|${VERSION}|CPILint|Rules file format invalid (exit 2)|Fix cpilint-rules.xml. (Advisory - did not block.)" >> failure-details.txt
              TOTAL_FAILED=$((TOTAL_FAILED + 1))
            elif [ "$CPILINT_EXIT" -eq 0 ]; then
              echo "PASSED: $IFLOW_ID"
              TOTAL_PASSED=$((TOTAL_PASSED + 1))
              echo "${IFLOW_ID}|${VERSION}|CPILint" >> passed-list.txt
            else
              echo "FAILED (advisory): $IFLOW_ID"
              TOTAL_FAILED=$((TOTAL_FAILED + 1))
              REASON=$(grep -iE "In iflow|does not have|not allowed|issue" "cpilint-${IFLOW_ID}.log" | head -3 | tr '\n' ' ' | sed 's/|/-/g')
              [ -z "$REASON" ] && REASON="CPILint rule violation (see log)"
              echo "${IFLOW_ID}|${VERSION}|CPILint|${REASON}|Advisory only - fix in SAP CPI when convenient. Did NOT block deployment." >> failure-details.txt
            fi
          done <<< "$NEW_ZIPS"

          echo "════════════════════════════════════════"
          echo "CPILint (advisory) — Passed: $TOTAL_PASSED | Failed: $TOTAL_FAILED"

          # ALWAYS exit 0 - CPILint never blocks. 
          echo "CPILint advisory complete - not blocking downstream jobs."
          exit 0

      - name: Upload CPILint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpilint-reports
          path: |
            cpilint-*.log
            failure-details.txt
            passed-list.txt
            cpilint-new-iflows.txt
          if-no-files-found: ignore

    # ═══════════════════════════════════════════════════════════════
  # JOB 3: Postman — tests ALL new iFlows (CPILint is advisory, not a gate)
  # ═══════════════════════════════════════════════════════════════
  run-postman:
    name: Postman collection tests
    needs: [download-ready-iflows, run-cpilint]
    if: needs.download-ready-iflows.outputs.skip_download != 'true'
    runs-on: ubuntu-latest

    outputs:
      has_passers: ${{ steps.run.outputs.has_passers }}

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download CPILint artifacts (new-iflows list handoff)
        uses: actions/download-artifact@v4
        with:
          name: cpilint-reports
          path: cpilint-artifacts
        continue-on-error: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        shell: bash
        run: npm install -g newman@6.2.1

      - name: Run Postman on ALL new iFlows (partial success)
        id: run
        env:
          CPI_DEV_ENDPOINT: ${{ secrets.CPI_DEV_ENDPOINT }}
          CPI_TOKEN_URL: ${{ secrets.CPI_RUNTIME_TOKEN_URL }}
          CPI_CLIENT_ID: ${{ secrets.CPI_RUNTIME_CLIENT_ID }}
          CPI_CLIENT_SECRET: ${{ secrets.CPI_RUNTIME_CLIENT_SECRET }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
          DOWNLOAD_DIR: ${{ env.DOWNLOAD_DIR }}
        shell: bash
        run: |
          set -uo pipefail
          COLLECTIONS_DIR="$DOWNLOAD_DIR/test"
          TOTAL_PASSED=0
          TOTAL_FAILED=0
          REMOVED=""
          : > failure-details.txt
          : > passed-list.txt

          # ── Read ALL new iFlows (CPILint is advisory - does NOT gate this) ──
          CPILINT_NEW="cpilint-artifacts/cpilint-new-iflows.txt"
          if [ ! -f "$CPILINT_NEW" ]; then
            echo "No new-iflows list found - nothing to Postman-test."
            echo "has_passers=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEW_IDS=$(cut -d'|' -f1 "$CPILINT_NEW" | grep -v '^$' | sort -u || true)
          if [ -z "$NEW_IDS" ]; then
            echo "No new iFlows to test."
            echo "has_passers=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "New iFlows to Postman-test (all, regardless of CPILint result):"
          echo "$NEW_IDS"

          while IFS= read -r IFLOW_ID; do
            [ -z "$IFLOW_ID" ] && continue

            SAFE_ID=$(echo "$IFLOW_ID" | tr -cd '[:alnum:]_.-')
            IFLOW_DIR="$DOWNLOAD_DIR/$SAFE_ID"
            collection="$COLLECTIONS_DIR/${IFLOW_ID}.collection.json"

            # Safety: iFlow folder must still exist
            [ ! -d "$IFLOW_DIR" ] && { echo "SKIP $IFLOW_ID (folder gone)"; continue; }

            VERSION=$(ls -1 "$IFLOW_DIR" 2>/dev/null | head -1)
            [ -z "$VERSION" ] && VERSION="unknown"

            echo "════════════════════════════════════════"
            echo "Testing: $IFLOW_ID v$VERSION"

            # Coverage check - no collection => remove + fail (Postman IS the gate)
            if [ ! -f "$collection" ]; then
              echo "NO COVERAGE: '$IFLOW_ID' - REMOVING"
              TOTAL_FAILED=$((TOTAL_FAILED + 1))
              echo "${IFLOW_ID}|${VERSION}|Coverage|No Postman collection in btp-iflows/test/|Create btp-iflows/test/${IFLOW_ID}.collection.json, then re-run." >> failure-details.txt
              if [ -n "$SAFE_ID" ] && [ "$SAFE_ID" != "test" ] && [ -d "$IFLOW_DIR" ] && [ "$IFLOW_DIR" != "$DOWNLOAD_DIR" ]; then
                rm -rf "$IFLOW_DIR"
                REMOVED="${REMOVED}${IFLOW_ID} (no-coverage); "
              fi
              continue
            fi

            FAILED_THIS=0
            set +e
            newman run "$collection" --env-var "baseUrl=$CPI_DEV_ENDPOINT" --env-var "tokenUrl=$CPI_TOKEN_URL" --env-var "clientId=$CPI_CLIENT_ID" --env-var "clientSecret=$CPI_CLIENT_SECRET" > "postman-${SAFE_ID}.log" 2>&1
            POSTMAN_EXIT=$?
            set -e

            cat "postman-${SAFE_ID}.log"
            echo "DEBUG: Newman exit code = $POSTMAN_EXIT"

            if [ "$POSTMAN_EXIT" -eq 0 ]; then
              echo "PASSED: $IFLOW_ID"
              TOTAL_PASSED=$((TOTAL_PASSED + 1))
              echo "${IFLOW_ID}|${VERSION}|Postman" >> passed-list.txt
            else
              echo "FAILED: $IFLOW_ID"
              TOTAL_FAILED=$((TOTAL_FAILED + 1))
              REASON=$(grep -iE "AssertionError|Error|Invalid URI|Forbidden|Not Found|expected" "postman-${SAFE_ID}.log" | head -3 | tr '\n' ' ' | sed 's/|/-/g')
              [ -z "$REASON" ] && REASON="Postman test failed (see log)"
              echo "${IFLOW_ID}|${VERSION}|Postman|${REASON}|Check the iFlow endpoint, payload, auth, expected response. Fix and re-run." >> failure-details.txt
              if [ -n "$SAFE_ID" ] && [ "$SAFE_ID" != "test" ] && [ -d "$IFLOW_DIR" ] && [ "$IFLOW_DIR" != "$DOWNLOAD_DIR" ]; then
                rm -rf "$IFLOW_DIR"
                REMOVED="${REMOVED}${IFLOW_ID} (test-fail); "
              fi
            fi
          done <<< "$NEW_IDS"

          echo "════════════════════════════════════════"
          echo "Postman — Passed: $TOTAL_PASSED | Failed: $TOTAL_FAILED"

          # Commit removals (Postman failures / no-coverage)
          if [ -n "$REMOVED" ]; then
            git add -A "$DOWNLOAD_DIR"
            if ! git diff --staged --quiet; then
              git commit -m "Remove Postman-failed iFlows - run ${{ github.run_id }}"
              git fetch origin "$TARGET_BRANCH"
              git pull --rebase origin "$TARGET_BRANCH"
              git push origin "$TARGET_BRANCH"
            fi
          fi

          # Output has_passers so auto-PR runs ONLY if something passed
          if [ -s passed-list.txt ]; then
            echo "has_passers=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_passers=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Postman gate complete (partial success allowed)"
          exit 0

      - name: Upload Postman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-reports
          path: |
            postman-*.log
            failure-details.txt
            passed-list.txt
          if-no-files-found: ignore
   # ═══════════════════════════════════════════════════════════════
  # JOB 4: Send Report — SMTP-FREE (GitHub issue + @mentions -> email)
  # Recipients: GitHub usernames in repo variable "distribution_list"
  # ═══════════════════════════════════════════════════════════════
  send-report:
    name: Send quality gate report
    needs: [run-cpilint, run-postman]
    if: always() && (needs.run-cpilint.result == 'success' || needs.run-cpilint.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Download CPILint artifacts
        uses: actions/download-artifact@v4
        with:
          name: cpilint-reports
          path: cpilint-artifacts
        continue-on-error: true

      - name: Download Postman artifacts
        uses: actions/download-artifact@v4
        with:
          name: postman-reports
          path: postman-artifacts
        continue-on-error: true

      - name: Build + notify report (SMTP-free)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
        shell: bash
        run: |
          set -uo pipefail

          cpilint_status() {
            local id="$1"
            if grep -q "^${id}|" cpilint-artifacts/passed-list.txt 2>/dev/null; then
              echo "PASSED"
            elif grep -q "^${id}|" cpilint-artifacts/failure-details.txt 2>/dev/null; then
              echo "FAILED"
            else
              echo "N/A"
            fi
          }

          PASSED_COUNT=0
          FAILED_COUNT=0
          CPILINT_FAILED=0
          PASSED_ROWS=""
          CPILINT_ISSUE_ROWS=""
          FAILED_ROWS=""

          # Passed (Postman) rows with per-gate status
          if [ -f "postman-artifacts/passed-list.txt" ]; then
            while IFS='|' read -r id version gate; do
              [ -z "$id" ] && continue
              PASSED_COUNT=$((PASSED_COUNT + 1))
              CP=$(cpilint_status "$id")
              [ "$CP" = "FAILED" ] && CPILINT_FAILED=$((CPILINT_FAILED + 1))
              PASSED_ROWS="${PASSED_ROWS}| ${id} | ${version} | PASSED | ${CP} |"$'\n'
            done < "postman-artifacts/passed-list.txt"
          fi

          # CPILint issue reasons (Postman-passers that failed CPILint)
          if [ -f "cpilint-artifacts/failure-details.txt" ]; then
            while IFS='|' read -r id version gate reason fix; do
              [ -z "$id" ] && continue
              if grep -q "^${id}|" postman-artifacts/passed-list.txt 2>/dev/null; then
                CPILINT_ISSUE_ROWS="${CPILINT_ISSUE_ROWS}| ${id} | ${version} | ${reason} |"$'\n'
              fi
            done < "cpilint-artifacts/failure-details.txt"
          fi

          # Failed (Postman/coverage) rows
          if [ -f "postman-artifacts/failure-details.txt" ]; then
            while IFS='|' read -r id version gate reason fix; do
              [ -z "$id" ] && continue
              FAILED_COUNT=$((FAILED_COUNT + 1))
              FAILED_ROWS="${FAILED_ROWS}| ${id} | ${version} | ${gate} | ${reason} | ${fix} |"$'\n'
            done < "postman-artifacts/failure-details.txt"
          fi

          # Overall status
          if [ "$FAILED_COUNT" -eq 0 ] && [ "$CPILINT_FAILED" -eq 0 ] && [ "$PASSED_COUNT" -gt 0 ]; then
            OVERALL="ALL PASSED"
          elif [ "$PASSED_COUNT" -eq 0 ] && [ "$FAILED_COUNT" -gt 0 ]; then
            OVERALL="ALL FAILED"
          elif [ "$PASSED_COUNT" -eq 0 ] && [ "$FAILED_COUNT" -eq 0 ]; then
            OVERALL="NO iFLOWS"
          else
            OVERALL="PARTIAL - REVIEW NEEDED"
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # distribution_list (usernames) -> @mentions
          RAW="${{ vars.distribution_list }}"
          if [ -n "$RAW" ]; then
            MENTIONS=$(echo "$RAW" | sed 's/[[:space:]]//g; s/,/ @/g; s/^/@/')
          else
            MENTIONS="(no recipients in distribution_list variable)"
          fi

          # Assemble markdown body
          BODY="${MENTIONS}

          ## CI/CD Quality Gate Report - ${OVERALL}

          **Branch:** ${TARGET_BRANCH} | **Time:** $(date -u +'%Y-%m-%d %H:%M UTC')
          **Summary:** ${PASSED_COUNT} passed Postman, ${FAILED_COUNT} failed, ${CPILINT_FAILED} passed Postman but failed CPILint
          "

          if [ -n "$PASSED_ROWS" ]; then
            BODY="${BODY}
          ### Passed iFlows (proceeding to PR)
          | iFlow | Version | Postman | CPILint |
          |-------|---------|---------|---------|
          ${PASSED_ROWS}"
          fi

          if [ -n "$CPILINT_ISSUE_ROWS" ]; then
            BODY="${BODY}
          ### CPILint Issues (deployment proceeded - please review)
          | iFlow | Version | Why CPILint Failed |
          |-------|---------|--------------------|
          ${CPILINT_ISSUE_ROWS}"
          fi

          if [ -n "$FAILED_ROWS" ]; then
            BODY="${BODY}
          ### Failed iFlows (removed - fix and re-run)
          | iFlow | Version | Gate | Why It Failed | How to Fix |
          |-------|---------|------|---------------|------------|
          ${FAILED_ROWS}"
          fi

          BODY="${BODY}

          [View full workflow run](${RUN_URL})"

          # 1) Step summary (always visible on the run)
          echo "$BODY" >> "$GITHUB_STEP_SUMMARY"

          # 2) Create Issue with @mentions -> GitHub emails users from notifications@github.com
          gh issue create \
            --title "[Quality Gate] ${OVERALL} - $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --body "$BODY" \
            || echo "::warning::Could not create notification issue"

          echo "Report notified (SMTP-free): $PASSED_COUNT passed, $FAILED_COUNT failed"

  # ═══════════════════════════════════════════════════════════════
  # JOB 5: Auto-PR to develop — SMTP-FREE approval (PR comment @mentions)
  # ═══════════════════════════════════════════════════════════════
  auto-pr-develop:
    name: Auto-PR to develop
    needs: [run-cpilint, run-postman]
    if: needs.run-postman.outputs.has_passers == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download Postman passed-list
        uses: actions/download-artifact@v4
        with:
          name: postman-reports
          path: postman-artifacts
        continue-on-error: true

      - name: Download CPILint artifacts (for status)
        uses: actions/download-artifact@v4
        with:
          name: cpilint-reports
          path: cpilint-artifacts
        continue-on-error: true

      - name: Create per-iFlow PRs
        id: create_prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEVELOP_BRANCH: ${{ env.DEVELOP_BRANCH }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
          DOWNLOAD_DIR: ${{ env.DOWNLOAD_DIR }}
        shell: bash
        run: |
          set -uo pipefail

          DEVELOP_BRANCH="${DEVELOP_BRANCH:-develop}"
          TARGET_BRANCH="${TARGET_BRANCH:-feature}"
          DOWNLOAD_DIR="${DOWNLOAD_DIR:-btp-iflows}"

          PASSED_FILE="postman-artifacts/passed-list.txt"
          if [ ! -f "$PASSED_FILE" ] || [ ! -s "$PASSED_FILE" ]; then
            echo "::error title=No iFlows passed::Nothing to create a PR for."
            echo "prs_created=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          cp "$PASSED_FILE" pr-work.txt
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          : > pr-summary.txt
          CREATED=0

          while IFS='|' read -r IFLOW_ID VERSION GATE; do
            [ -z "$IFLOW_ID" ] && continue
            SAFE_ID=$(echo "$IFLOW_ID" | tr -cd '[:alnum:]_.-')
            [ -z "$VERSION" ] && VERSION="unknown"

            echo "════════════════════════════════════════"
            echo "Processing PR for iFlow: $IFLOW_ID (v$VERSION)"

            if (
              set -e
              git fetch origin "$DEVELOP_BRANCH"
              TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
              TRIGGER_BRANCH="qa-deploy/${SAFE_ID}-${TIMESTAMP}"
              git checkout -B "$TRIGGER_BRANCH" "origin/$DEVELOP_BRANCH"

              mkdir -p .qa-triggers
              printf 'iFlow: %s\nVersion: %s\nSource: %s\nTriggered: %s\n' \
                "$IFLOW_ID" "$VERSION" "$TARGET_BRANCH" "$(date -u +'%Y-%m-%d %H:%M UTC')" \
                > ".qa-triggers/${SAFE_ID}.txt"
              git add ".qa-triggers/${SAFE_ID}.txt"
              git commit -m "QA Deploy Trigger: $IFLOW_ID (gates passed, source: $TARGET_BRANCH)"
              git push origin "$TRIGGER_BRANCH"

              PR_BODY=$(printf '%s\n' \
                "## QA Deployment Trigger for ${IFLOW_ID}" \
                "" \
                "Passed the Postman quality gate. Approval required before merge to ${DEVELOP_BRANCH}." \
                "" \
                "- iFlow: ${IFLOW_ID}" \
                "- Version: ${VERSION}" \
                "- Source: ${TARGET_BRANCH}" \
                "- Run: ${RUN_URL}")

              PR_URL=$(gh pr create \
                --base "$DEVELOP_BRANCH" \
                --head "$TRIGGER_BRANCH" \
                --title "[QA Deploy] $IFLOW_ID - needs approval" \
                --body "$PR_BODY")

              PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
              echo "PR #$PR_NUMBER created"

              echo "${IFLOW_ID}|${VERSION}|${PR_NUMBER}" >> pr-summary.txt
            ); then
              CREATED=$((CREATED + 1))
            else
              echo "::warning::Could not create PR for '$IFLOW_ID' - continuing."
              git checkout "origin/$TARGET_BRANCH" 2>/dev/null || true
            fi
          done < pr-work.txt

          if [ -s pr-summary.txt ]; then
            echo "prs_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "prs_created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify approvers (SMTP-free PR comment + @mentions)
        if: steps.create_prs.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -uo pipefail

          cpilint_status() {
            local id="$1"
            if grep -q "^${id}|" cpilint-artifacts/passed-list.txt 2>/dev/null; then
              echo "PASSED"
            elif grep -q "^${id}|" cpilint-artifacts/failure-details.txt 2>/dev/null; then
              echo "FAILED"
            else
              echo "N/A"
            fi
          }

          # distribution_list (usernames) -> @mentions
          RAW="${{ vars.distribution_list }}"
          if [ -n "$RAW" ]; then
            MENTIONS=$(echo "$RAW" | sed 's/[[:space:]]//g; s/,/ @/g; s/^/@/')
          else
            MENTIONS=""
          fi

          # Comment on each created PR (pr-summary.txt: id|version|prnum)
          while IFS='|' read -r id version prnum; do
            [ -z "$id" ] && continue
            CP=$(cpilint_status "$id")

            gh pr comment "$prnum" --body "${MENTIONS}

          **Approval needed:** \`${id}\` (v${version}) passed the Postman quality gate.

          | Gate | Result |
          |------|--------|
          | Postman | PASSED |
          | CPILint | ${CP} |

          Please review and approve this PR to deploy to QA (merge to develop)." \
            || echo "::warning::Could not comment on PR #$prnum"

            echo "Notified approvers on PR #$prnum for $id"
          done < pr-summary.txt
