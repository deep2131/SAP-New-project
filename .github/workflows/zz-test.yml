name: SAP BTP

on:
  workflow_dispatch:
  # NOTE: No push trigger - runs ONLY manually.
  # Developers push collections to btp-iflows/test/ without triggering runs.

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: download-ready-iflows-feature
  cancel-in-progress: false

env:
  TARGET_BRANCH: feature
  DEPLOYMENT_MARKER: ReadyForDeployment
  DOWNLOAD_DIR: btp-iflows
  EXTRACT_ZIP: "true"
  VERSION_REGEX: '^[0-9]+\.[0-9]+\.[0-9]+\.ReadyForDeployment$'
  CPILINT_RULES: cpilint-rules.xml
  CPILINT_VERSION: "1.1.0"

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Download iFlows from SAP CPI
  # ═══════════════════════════════════════════════════════════════
  download-ready-iflows:
    name: Download X.Y.Z.ReadyForDeployment iFlows from SAP CPI
    runs-on: ubuntu-latest
    environment: dev

    outputs:
      skip_download: ${{ steps.set_output.outputs.skip_download }}

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Validate configuration and secrets
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          echo "Configuration"
          echo "Target branch     : $TARGET_BRANCH"
          echo "Deployment marker : $DEPLOYMENT_MARKER"
          echo "Download dir      : $DOWNLOAD_DIR"

          check_secret() {
            local name="$1" value="$2" prefix="${3:-}"
            if [ -z "${value:-}" ]; then
              echo "ERROR: $name is missing or empty."
              exit 1
            fi
            if [ -n "$prefix" ] && [ "${value#$prefix}" = "$value" ]; then
              echo "ERROR: $name must start with $prefix"
              exit 1
            fi
          }

          check_secret "SAP_BTP_TOKEN_URL" "$SAP_BTP_TOKEN_URL" "https://"
          check_secret "SAP_BTP_OAUTH_CLIENT_ID" "$SAP_BTP_OAUTH_CLIENT_ID"
          check_secret "SAP_BTP_OAUTH_CLIENT_SECRET" "$SAP_BTP_OAUTH_CLIENT_SECRET"
          check_secret "SAP_CPI_API_BASE_URL" "$SAP_CPI_API_BASE_URL" "https://"

          echo "All secrets validated."

      - name: Setup Git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Git configured. On branch: $TARGET_BRANCH"

      - name: Get SAP BTP OAuth token
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          TOKEN_URL="${SAP_BTP_TOKEN_URL%/}"
          [ "${TOKEN_URL%/oauth/token}" = "$TOKEN_URL" ] && TOKEN_URL="$TOKEN_URL/oauth/token"

          echo "Requesting SAP OAuth token..."

          RESPONSE=$(curl -sS \
            -w "\nHTTP_CODE=%{http_code}" \
            -X POST "$TOKEN_URL" \
            -u "$SAP_BTP_OAUTH_CLIENT_ID:$SAP_BTP_OAUTH_CLIENT_SECRET" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials")

          HTTP_CODE=$(echo "$RESPONSE" | sed -n 's/^HTTP_CODE=//p')
          BODY=$(echo "$RESPONSE" | sed '/^HTTP_CODE=/d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Token request failed (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi

          TOKEN=$(echo "$BODY" | jq -r '.access_token // empty')
          [ -z "$TOKEN" ] && { echo "No access_token in response"; exit 1; }

          echo "::add-mask::$TOKEN"
          echo "SAP_ACCESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "Token obtained."

      - name: Discover matching iFlows from SAP CPI
        shell: bash
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          API_BASE="${SAP_CPI_API_BASE_URL%/}"
          mkdir -p "$DOWNLOAD_DIR"

          cpi_get() {
            local url="$1" output="$2"
            curl -sS -w "%{http_code}" \
              -X GET "$url" \
              -H "Authorization: Bearer $SAP_ACCESS_TOKEN" \
              -H "Accept: application/json" \
              -o "$output"
          }

          echo "Fetching IntegrationPackages..."
          HTTP_CODE=$(cpi_get "$API_BASE/api/v1/IntegrationPackages?\$format=json" packages.json)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to fetch packages (HTTP $HTTP_CODE)"
            cat packages.json
            exit 1
          fi

          echo '{"d":{"results":[]}}' > all-artifacts.json

          jq -r '.d.results[]?.Id' packages.json | while read -r PKG_ID; do
            [ -z "$PKG_ID" ] || [ "$PKG_ID" = "null" ] && continue

            ODATA_PKG_ID=$(printf "%s" "$PKG_ID" | sed "s/'/''/g")
            PKG_FILE="pkg-$(echo "$PKG_ID" | tr -cd '[:alnum:]_.-').json"

            HTTP_CODE=$(cpi_get \
              "$API_BASE/api/v1/IntegrationPackages('$ODATA_PKG_ID')/IntegrationDesigntimeArtifacts?\$format=json" \
              "$PKG_FILE")

            if [ "$HTTP_CODE" = "200" ]; then
              jq -s '{d:{results:((.[0].d.results // []) + (.[1].d.results // []))}}' \
                all-artifacts.json "$PKG_FILE" > merged.json
              mv merged.json all-artifacts.json
              echo "$PKG_ID"
            else
              echo "Skipped $PKG_ID (HTTP $HTTP_CODE)"
            fi
          done

          TOTAL=$(jq '.d.results | length' all-artifacts.json)
          echo "Total artifacts discovered: $TOTAL"

          jq --arg pattern "$VERSION_REGEX" '
            [.d.results[]
              | select(
                  .Id != null
                  and (.Version | type == "string")
                  and (.Version | test($pattern))
                )
              | {
                  id: .Id,
                  packageId: .PackageId,
                  savedVersion: .Version
                }
            ]
          ' all-artifacts.json > selected-iflows.json

          MATCHED=$(jq length selected-iflows.json)
          echo "iFlows matching X.Y.Z.$DEPLOYMENT_MARKER: $MATCHED"
          jq -r '.[] | "\(.id) | \(.packageId) | v\(.savedVersion)"' selected-iflows.json

          if [ "$MATCHED" -eq 0 ]; then
            echo "::notice title=No matching iFlows::No iFlows found with version X.Y.Z.$DEPLOYMENT_MARKER"
            echo "SKIP_DOWNLOAD=true" >> "$GITHUB_ENV"
          fi

      - name: Filter out already downloaded iFlows
        if: env.SKIP_DOWNLOAD != 'true'
        shell: bash
        run: |
          set -euo pipefail

          jq -c '.[]' selected-iflows.json > items.txt
          echo "[]" > new-iflows.json
          NEW_COUNT=0
          EXISTING_COUNT=0

          while IFS= read -r item; do
            IFLOW_ID=$(echo "$item" | jq -r '.id')
            VERSION=$(echo "$item" | jq -r '.savedVersion')
            SAFE_ID=$(echo "$IFLOW_ID" | tr -cd '[:alnum:]_.-')
            SAFE_VER=$(echo "$VERSION" | tr -cd '[:alnum:]_.-')

            if [ -f "$DOWNLOAD_DIR/$SAFE_ID/$SAFE_VER/${SAFE_ID}_${SAFE_VER}.zip" ]; then
              echo "Already exists: $IFLOW_ID v$VERSION"
              EXISTING_COUNT=$((EXISTING_COUNT + 1))
            else
              echo "New: $IFLOW_ID v$VERSION"
              echo "$item" | jq -s '.' | jq -s '.[0] + .[1]' new-iflows.json - > tmp.json
              mv tmp.json new-iflows.json
              NEW_COUNT=$((NEW_COUNT + 1))
            fi
          done < items.txt

          mv new-iflows.json selected-iflows.json

          echo "Existing: $EXISTING_COUNT | New: $NEW_COUNT"

          if [ "$NEW_COUNT" -eq 0 ]; then
            echo "::notice title=No new iFlows::All discovered iFlows already exist in the branch."
            echo "SKIP_DOWNLOAD=true" >> "$GITHUB_ENV"
          fi

      - name: Download new iFlows from SAP CPI
        if: env.SKIP_DOWNLOAD != 'true'
        shell: bash
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          API_BASE="${SAP_CPI_API_BASE_URL%/}"

          jq -c '.[]' selected-iflows.json | while read -r item; do
            IFLOW_ID=$(echo "$item" | jq -r '.id')
            VERSION=$(echo "$item" | jq -r '.savedVersion')

            SAFE_ID=$(echo "$IFLOW_ID" | tr -cd '[:alnum:]_.-')
            SAFE_VER=$(echo "$VERSION" | tr -cd '[:alnum:]_.-')
            TARGET_PATH="$DOWNLOAD_DIR/$SAFE_ID/$SAFE_VER"
            ZIP_FILE="$TARGET_PATH/${SAFE_ID}_${SAFE_VER}.zip"

            mkdir -p "$TARGET_PATH"

            ODATA_ID=$(printf "%s" "$IFLOW_ID" | sed "s/'/''/g")
            ODATA_VER=$(printf "%s" "$VERSION" | sed "s/'/''/g")
            URL="$API_BASE/api/v1/IntegrationDesigntimeArtifacts(Id='$ODATA_ID',Version='$ODATA_VER')/\$value"

            echo "$IFLOW_ID | v$VERSION"

            HTTP_CODE=$(curl -sS \
              --connect-timeout 10 \
              --max-time 90 \
              -w "%{http_code}" \
              -X GET "$URL" \
              -H "Authorization: Bearer $SAP_ACCESS_TOKEN" \
              -H "Accept: application/zip" \
              -o "$ZIP_FILE")

            if [ "$HTTP_CODE" = "200" ] && [ -s "$ZIP_FILE" ]; then
              echo "Downloaded ($HTTP_CODE)"

              if [ "$EXTRACT_ZIP" = "true" ]; then
                EXTRACT_PATH="$TARGET_PATH/extracted"
                rm -rf "$EXTRACT_PATH"
                mkdir -p "$EXTRACT_PATH"
                if unzip -tq "$ZIP_FILE" >/dev/null 2>&1; then
                  unzip -q "$ZIP_FILE" -d "$EXTRACT_PATH"
                  echo "Extracted"
                else
                  echo "Invalid ZIP, keeping raw file only"
                fi
              fi
            else
              echo "Failed (HTTP $HTTP_CODE)"
              rm -f "$ZIP_FILE"
              rmdir "$TARGET_PATH" 2>/dev/null || true
            fi
          done

          echo "Total ZIPs in $DOWNLOAD_DIR: $(find "$DOWNLOAD_DIR" -name "*.zip" | wc -l)"

      - name: Set download outcome output
        id: set_output
        if: always()
        shell: bash
        run: |
          echo "skip_download=${SKIP_DOWNLOAD:-false}" >> "$GITHUB_OUTPUT"

      - name: Commit and push downloaded iFlows
        if: env.SKIP_DOWNLOAD != 'true'
        shell: bash
        run: |
          set -euo pipefail

          git add "$DOWNLOAD_DIR"

          if git diff --staged --quiet; then
            echo "::notice title=Nothing to commit::No new files were staged."
            exit 0
          fi

          git commit -m "Download SAP BTP iFlows (X.Y.Z.$DEPLOYMENT_MARKER)"

          git fetch origin "$TARGET_BRANCH"
          if ! git pull --rebase origin "$TARGET_BRANCH"; then
            echo "Rebase conflict detected"
            git rebase --abort || true
            exit 1
          fi

          git push origin "$TARGET_BRANCH"
          echo "Pushed to branch: $TARGET_BRANCH"

      - name: Report clean run
        if: env.SKIP_DOWNLOAD == 'true'
        shell: bash
        run: |
          echo "::notice title=Success::All iFlows are already downloaded. Nothing new."
 # ═══════════════════════════════════════════════════════════════
  # JOB 2: CPILint — runs on LATEST (new) iFlows; writes passed-list
  # ═══════════════════════════════════════════════════════════════
  run-cpilint:
    name: CPILint static analysis
    needs: download-ready-iflows
    if: needs.download-ready-iflows.outputs.skip_download != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install CPILint
        shell: bash
        run: |
          set -euo pipefail
          [ ! -f "$CPILINT_RULES" ] && { echo "::error::$CPILINT_RULES not found"; exit 1; }
          CPILINT_URL="https://github.com/mwittrock/cpilint/releases/download/v${CPILINT_VERSION}/cpilint-${CPILINT_VERSION}.zip"
          curl -sSL -o cpilint.zip "$CPILINT_URL"
          unzip -q cpilint.zip -d cpilint-tool
          CPILINT_BIN=$(find cpilint-tool -name "cpilint" -type f | head -1)
          chmod +x "$CPILINT_BIN"
          echo "CPILINT_BIN=$CPILINT_BIN" >> "$GITHUB_ENV"

      - name: Run CPILint on latest iFlows (partial success)
        env:
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
          DOWNLOAD_DIR: ${{ env.DOWNLOAD_DIR }}
        shell: bash
        run: |
          set -uo pipefail

          # Detect newly added iFlow ZIPs in the latest (download) commit
          NEW_ZIPS=$(git diff --name-only --diff-filter=A HEAD^ HEAD -- "$DOWNLOAD_DIR/**/*.zip" 2>/dev/null || true)
          [ -z "$NEW_ZIPS" ] && { echo "No new ZIPs to lint."; : > passed-list.txt; : > failure-details.txt; exit 0; }

          echo "Newly downloaded iFlows to lint:"
          echo "$NEW_ZIPS"

          TOTAL_PASSED=0
          TOTAL_FAILED=0
          REMOVED=""
          : > failure-details.txt
          : > passed-list.txt

          while IFS= read -r zip; do
            [ -z "$zip" ] && continue
            [ ! -f "$zip" ] && continue
            IFLOW_ID=$(basename "$(dirname "$(dirname "$zip")")")
            VERSION=$(basename "$(dirname "$zip")")

            echo "════════════════════════════════════════"
            echo "Linting: $IFLOW_ID v$VERSION"

            set +e
            "$CPILINT_BIN" -rules "$CPILINT_RULES" -files "$zip" > "cpilint-${IFLOW_ID}.log" 2>&1
            CPILINT_EXIT=$?
            set -e

            cat "cpilint-${IFLOW_ID}.log"
            echo "DEBUG: CPILint exit code = $CPILINT_EXIT"

            if [ "$CPILINT_EXIT" -eq 2 ]; then
              echo "::error::CPILint rules file is invalid. Fix $CPILINT_RULES."
              exit 1
            elif [ "$CPILINT_EXIT" -eq 0 ]; then
              echo "PASSED: $IFLOW_ID"
              TOTAL_PASSED=$((TOTAL_PASSED + 1))
              # Record iFlow that is NEW and PASSED CPILint (for Postman handoff)
              echo "${IFLOW_ID}|${VERSION}|CPILint" >> passed-list.txt
            else
              echo "FAILED: $IFLOW_ID - removing"
              TOTAL_FAILED=$((TOTAL_FAILED + 1))
              REASON=$(grep -iE "In iflow|does not have|not allowed|issue" "cpilint-${IFLOW_ID}.log" | head -3 | tr '\n' ' ' | sed 's/|/-/g')
              [ -z "$REASON" ] && REASON="CPILint rule violation (see full log)"
              echo "${IFLOW_ID}|${VERSION}|CPILint|${REASON}|Fix the rule violation in SAP CPI, save as a NEW version, re-run." >> failure-details.txt

              SAFE_ID=$(echo "$IFLOW_ID" | tr -cd '[:alnum:]_.-')
              IFLOW_DIR="$DOWNLOAD_DIR/$SAFE_ID"
              if [ -n "$SAFE_ID" ] && [ "$SAFE_ID" != "test" ] && [ -d "$IFLOW_DIR" ] && [ "$IFLOW_DIR" != "$DOWNLOAD_DIR" ]; then
                rm -rf "$IFLOW_DIR"
                REMOVED="${REMOVED}${IFLOW_ID}; "
              fi
            fi
          done <<< "$NEW_ZIPS"

          echo "════════════════════════════════════════"
          echo "CPILint — Passed: $TOTAL_PASSED | Failed: $TOTAL_FAILED"

          if [ -n "$REMOVED" ]; then
            git add -A "$DOWNLOAD_DIR"
            if ! git diff --staged --quiet; then
              git commit -m "Remove CPILint-failed iFlows - run ${{ github.run_id }}"
              git fetch origin "$TARGET_BRANCH"
              git pull --rebase origin "$TARGET_BRANCH"
              git push origin "$TARGET_BRANCH"
            fi
          fi
          if [ "$TOTAL_PASSED" -gt 0 ]; then
            echo "At least one iFlow passed CPILint - continuing to Postman."
            exit 0                             
          else
            echo "::error title=CPILint - all failed::All iFlow(s) failed CPILint and were removed. Fix issues (see report) and re-run."
            exit 1                             
          fi
          # ALWAYS exit 0 - passers continue to Postman via passed-list.txt
          echo "CPILint gate complete (partial success allowed)"
          exit 0

      - name: Upload CPILint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpilint-reports
          path: |
            cpilint-*.log
            failure-details.txt
            passed-list.txt
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: Postman — tests ONLY iFlows that passed CPILint (handoff)
  # ═══════════════════════════════════════════════════════════════
  run-postman:
    name: Postman collection tests
    needs: [download-ready-iflows, run-cpilint]
    if: needs.download-ready-iflows.outputs.skip_download != 'true' && needs.run-cpilint.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download CPILint passed-list (handoff)
        uses: actions/download-artifact@v4
        with:
          name: cpilint-reports
          path: cpilint-artifacts
        continue-on-error: true

      - name: Install Postman CLI
        shell: bash
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
          echo "Postman CLI: $(postman --version)"

      - name: Run Postman on CPILint-passers only (partial success)
        env:
          CPI_DEV_ENDPOINT: ${{ secrets.CPI_DEV_ENDPOINT }}
          CPI_TOKEN_URL: ${{ secrets.CPI_RUNTIME_TOKEN_URL }}
          CPI_CLIENT_ID: ${{ secrets.CPI_RUNTIME_CLIENT_ID }}
          CPI_CLIENT_SECRET: ${{ secrets.CPI_RUNTIME_CLIENT_SECRET }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
          DOWNLOAD_DIR: ${{ env.DOWNLOAD_DIR }}
        shell: bash
        run: |
          set -uo pipefail
          COLLECTIONS_DIR="$DOWNLOAD_DIR/test"
          TOTAL_PASSED=0
          TOTAL_FAILED=0
          REMOVED=""
          : > failure-details.txt
          : > passed-list.txt

          # ═══ Read the iFlows that are NEW and PASSED CPILint ═══
          CPILINT_PASSED="cpilint-artifacts/passed-list.txt"
          if [ ! -f "$CPILINT_PASSED" ]; then
            echo "No CPILint passed-list found - nothing to Postman-test."
            exit 0
          fi

          NEW_IDS=$(cut -d'|' -f1 "$CPILINT_PASSED" | grep -v '^$' | sort -u)
          if [ -z "$NEW_IDS" ]; then
            echo "No iFlows passed CPILint - nothing to Postman-test."
            exit 0
          fi

          echo "iFlows that passed CPILint (to Postman-test):"
          echo "$NEW_IDS"

          while IFS= read -r IFLOW_ID; do
            [ -z "$IFLOW_ID" ] && continue

            SAFE_ID=$(echo "$IFLOW_ID" | tr -cd '[:alnum:]_.-')
            IFLOW_DIR="$DOWNLOAD_DIR/$SAFE_ID"
            collection="$COLLECTIONS_DIR/${IFLOW_ID}.collection.json"

            # Safety: must still exist
            [ ! -d "$IFLOW_DIR" ] && { echo "SKIP $IFLOW_ID (folder gone)"; continue; }

            VERSION=$(ls -1 "$IFLOW_DIR" 2>/dev/null | head -1)
            [ -z "$VERSION" ] && VERSION="unknown"

            echo "════════════════════════════════════════"
            echo "Testing: $IFLOW_ID v$VERSION"

            # Coverage check - no collection => remove + fail
            if [ ! -f "$collection" ]; then
              echo "NO COVERAGE: '$IFLOW_ID' - REMOVING"
              TOTAL_FAILED=$((TOTAL_FAILED + 1))
              echo "${IFLOW_ID}|${VERSION}|Coverage|No Postman collection in btp-iflows/test/|Create btp-iflows/test/${IFLOW_ID}.collection.json, then re-run." >> failure-details.txt
              if [ -n "$SAFE_ID" ] && [ "$SAFE_ID" != "test" ] && [ -d "$IFLOW_DIR" ] && [ "$IFLOW_DIR" != "$DOWNLOAD_DIR" ]; then
                rm -rf "$IFLOW_DIR"
                REMOVED="${REMOVED}${IFLOW_ID} (no-coverage); "
              fi
              continue
            fi

            FAILED_THIS=0
            set +e
            postman collection run "$collection" --env-var "baseUrl=$CPI_DEV_ENDPOINT" --env-var "tokenUrl=$CPI_TOKEN_URL" --env-var "clientId=$CPI_CLIENT_ID" --env-var "clientSecret=$CPI_CLIENT_SECRET" > "postman-${SAFE_ID}.log" 2>&1
            POSTMAN_EXIT=$?
            set -e

            cat "postman-${SAFE_ID}.log"
            echo "DEBUG: Postman exit code = $POSTMAN_EXIT"

            if [ "$POSTMAN_EXIT" -eq 0 ]; then
              echo "PASSED: $IFLOW_ID"
              TOTAL_PASSED=$((TOTAL_PASSED + 1))
              echo "${IFLOW_ID}|${VERSION}|Postman" >> passed-list.txt
            else
              echo "FAILED: $IFLOW_ID"
              TOTAL_FAILED=$((TOTAL_FAILED + 1))
              REASON=$(grep -iE "AssertionError|Error|Invalid URI|Forbidden|Not Found|expected" "postman-${SAFE_ID}.log" | head -3 | tr '\n' ' ' | sed 's/|/-/g')
              [ -z "$REASON" ] && REASON="Postman test failed (see log)"
              echo "${IFLOW_ID}|${VERSION}|Postman|${REASON}|Check the iFlow endpoint, payload, auth, expected response. Fix and re-run." >> failure-details.txt
              if [ -n "$SAFE_ID" ] && [ "$SAFE_ID" != "test" ] && [ -d "$IFLOW_DIR" ] && [ "$IFLOW_DIR" != "$DOWNLOAD_DIR" ]; then
                rm -rf "$IFLOW_DIR"
                REMOVED="${REMOVED}${IFLOW_ID} (test-fail); "
              fi
            fi
          done <<< "$NEW_IDS"

          echo "════════════════════════════════════════"
          echo "Postman — Passed: $TOTAL_PASSED | Failed: $TOTAL_FAILED"

          if [ -n "$REMOVED" ]; then
            git add -A "$DOWNLOAD_DIR"
            if ! git diff --staged --quiet; then
              git commit -m "Remove Postman-failed iFlows - run ${{ github.run_id }}"
              git fetch origin "$TARGET_BRANCH"
              git pull --rebase origin "$TARGET_BRANCH"
              git push origin "$TARGET_BRANCH"
            fi
          fi

          # ALWAYS exit 0 - passers continue to auto-PR
          echo "Postman gate complete (partial success allowed)"
          exit 0

      - name: Upload Postman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-reports
          path: |
            postman-*.log
            failure-details.txt
            passed-list.txt
          if-no-files-found: ignore
  # ═══════════════════════════════════════════════════════════════
