name: Download ReadyForDeployment iFlows from SAP BTP

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: download-ready-iflows-feature
  cancel-in-progress: false

env:
  TARGET_BRANCH: feature
  DEPLOYMENT_MARKER: ReadyForDeployment
  DOWNLOAD_DIR: btp-iflows
  EXTRACT_ZIP: "true"
  VERSION_REGEX: '^[0-9]+\.[0-9]+\.[0-9]+\.ReadyForDeployment$'
  CPILINT_RULES: cpilint-rules.xml
  CPILINT_VERSION: "1.1.0"

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Download iFlows (your existing job + skip output added)
  # ═══════════════════════════════════════════════════════════════
  download-ready-iflows:
    name: Download X.Y.Z.ReadyForDeployment iFlows from SAP CPI
    runs-on: ubuntu-latest
    environment: dev

    outputs:
      skip_download: ${{ steps.set_output.outputs.skip_download }}

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Validate configuration and secrets
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          echo "Configuration"
          echo "Target branch     : $TARGET_BRANCH"
          echo "Deployment marker : $DEPLOYMENT_MARKER"
          echo "Download dir      : $DOWNLOAD_DIR"

          check_secret() {
            local name="$1" value="$2" prefix="${3:-}"
            if [ -z "${value:-}" ]; then
              echo "ERROR: $name is missing or empty."
              exit 1
            fi
            if [ -n "$prefix" ] && [ "${value#$prefix}" = "$value" ]; then
              echo "ERROR: $name must start with $prefix"
              exit 1
            fi
          }

          check_secret "SAP_BTP_TOKEN_URL" "$SAP_BTP_TOKEN_URL" "https://"
          check_secret "SAP_BTP_OAUTH_CLIENT_ID" "$SAP_BTP_OAUTH_CLIENT_ID"
          check_secret "SAP_BTP_OAUTH_CLIENT_SECRET" "$SAP_BTP_OAUTH_CLIENT_SECRET"
          check_secret "SAP_CPI_API_BASE_URL" "$SAP_CPI_API_BASE_URL" "https://"

          echo "All secrets validated."

      - name: Setup Git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Git configured. On branch: $TARGET_BRANCH"

      - name: Get SAP BTP OAuth token
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          TOKEN_URL="${SAP_BTP_TOKEN_URL%/}"
          [ "${TOKEN_URL%/oauth/token}" = "$TOKEN_URL" ] && TOKEN_URL="$TOKEN_URL/oauth/token"

          echo "Requesting SAP OAuth token..."

          RESPONSE=$(curl -sS \
            -w "\nHTTP_CODE=%{http_code}" \
            -X POST "$TOKEN_URL" \
            -u "$SAP_BTP_OAUTH_CLIENT_ID:$SAP_BTP_OAUTH_CLIENT_SECRET" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials")

          HTTP_CODE=$(echo "$RESPONSE" | sed -n 's/^HTTP_CODE=//p')
          BODY=$(echo "$RESPONSE" | sed '/^HTTP_CODE=/d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Token request failed (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi

          TOKEN=$(echo "$BODY" | jq -r '.access_token // empty')
          [ -z "$TOKEN" ] && { echo "No access_token in response"; exit 1; }

          echo "::add-mask::$TOKEN"
          echo "SAP_ACCESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "Token obtained."

      - name: Discover matching iFlows from SAP CPI
        shell: bash
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          API_BASE="${SAP_CPI_API_BASE_URL%/}"
          mkdir -p "$DOWNLOAD_DIR"

          cpi_get() {
            local url="$1" output="$2"
            curl -sS -w "%{http_code}" \
              -X GET "$url" \
              -H "Authorization: Bearer $SAP_ACCESS_TOKEN" \
              -H "Accept: application/json" \
              -o "$output"
          }

          echo "Fetching IntegrationPackages..."
          HTTP_CODE=$(cpi_get "$API_BASE/api/v1/IntegrationPackages?\$format=json" packages.json)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to fetch packages (HTTP $HTTP_CODE)"
            cat packages.json
            exit 1
          fi

          echo '{"d":{"results":[]}}' > all-artifacts.json

          jq -r '.d.results[]?.Id' packages.json | while read -r PKG_ID; do
            [ -z "$PKG_ID" ] || [ "$PKG_ID" = "null" ] && continue

            ODATA_PKG_ID=$(printf "%s" "$PKG_ID" | sed "s/'/''/g")
            PKG_FILE="pkg-$(echo "$PKG_ID" | tr -cd '[:alnum:]_.-').json"

            HTTP_CODE=$(cpi_get \
              "$API_BASE/api/v1/IntegrationPackages('$ODATA_PKG_ID')/IntegrationDesigntimeArtifacts?\$format=json" \
              "$PKG_FILE")

            if [ "$HTTP_CODE" = "200" ]; then
              jq -s '{d:{results:((.[0].d.results // []) + (.[1].d.results // []))}}' \
                all-artifacts.json "$PKG_FILE" > merged.json
              mv merged.json all-artifacts.json
              echo "$PKG_ID"
            else
              echo "Skipped $PKG_ID (HTTP $HTTP_CODE)"
            fi
          done

          TOTAL=$(jq '.d.results | length' all-artifacts.json)
          echo "Total artifacts discovered: $TOTAL"

          jq --arg pattern "$VERSION_REGEX" '
            [.d.results[]
              | select(
                  .Id != null
                  and (.Version | type == "string")
                  and (.Version | test($pattern))
                )
              | {
                  id: .Id,
                  packageId: .PackageId,
                  savedVersion: .Version
                }
            ]
          ' all-artifacts.json > selected-iflows.json

          MATCHED=$(jq length selected-iflows.json)
          echo "iFlows matching X.Y.Z.$DEPLOYMENT_MARKER: $MATCHED"
          jq -r '.[] | "\(.id) | \(.packageId) | v\(.savedVersion)"' selected-iflows.json

          if [ "$MATCHED" -eq 0 ]; then
            echo "::notice title=No matching iFlows::No iFlows found with version X.Y.Z.$DEPLOYMENT_MARKER"
            echo "SKIP_DOWNLOAD=true" >> "$GITHUB_ENV"
          fi

      - name: Filter out already downloaded iFlows
        if: env.SKIP_DOWNLOAD != 'true'
        shell: bash
        run: |
          set -euo pipefail

          jq -c '.[]' selected-iflows.json > items.txt
          echo "[]" > new-iflows.json
          NEW_COUNT=0
          EXISTING_COUNT=0

          while IFS= read -r item; do
            IFLOW_ID=$(echo "$item" | jq -r '.id')
            VERSION=$(echo "$item" | jq -r '.savedVersion')
            SAFE_ID=$(echo "$IFLOW_ID" | tr -cd '[:alnum:]_.-')
            SAFE_VER=$(echo "$VERSION" | tr -cd '[:alnum:]_.-')

            if [ -f "$DOWNLOAD_DIR/$SAFE_ID/$SAFE_VER/${SAFE_ID}_${SAFE_VER}.zip" ]; then
              echo "Already exists: $IFLOW_ID v$VERSION"
              EXISTING_COUNT=$((EXISTING_COUNT + 1))
            else
              echo "New: $IFLOW_ID v$VERSION"
              echo "$item" | jq -s '.' | jq -s '.[0] + .[1]' new-iflows.json - > tmp.json
              mv tmp.json new-iflows.json
              NEW_COUNT=$((NEW_COUNT + 1))
            fi
          done < items.txt

          mv new-iflows.json selected-iflows.json

          echo "Existing: $EXISTING_COUNT | New: $NEW_COUNT"

          if [ "$NEW_COUNT" -eq 0 ]; then
            echo "::notice title=No new iFlows::All discovered iFlows already exist in the branch."
            echo "SKIP_DOWNLOAD=true" >> "$GITHUB_ENV"
          fi

      - name: Download new iFlows from SAP CPI
        if: env.SKIP_DOWNLOAD != 'true'
        shell: bash
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail

          API_BASE="${SAP_CPI_API_BASE_URL%/}"

          jq -c '.[]' selected-iflows.json | while read -r item; do
            IFLOW_ID=$(echo "$item" | jq -r '.id')
            VERSION=$(echo "$item" | jq -r '.savedVersion')

            SAFE_ID=$(echo "$IFLOW_ID" | tr -cd '[:alnum:]_.-')
            SAFE_VER=$(echo "$VERSION" | tr -cd '[:alnum:]_.-')
            TARGET_PATH="$DOWNLOAD_DIR/$SAFE_ID/$SAFE_VER"
            ZIP_FILE="$TARGET_PATH/${SAFE_ID}_${SAFE_VER}.zip"

            mkdir -p "$TARGET_PATH"

            ODATA_ID=$(printf "%s" "$IFLOW_ID" | sed "s/'/''/g")
            ODATA_VER=$(printf "%s" "$VERSION" | sed "s/'/''/g")
            URL="$API_BASE/api/v1/IntegrationDesigntimeArtifacts(Id='$ODATA_ID',Version='$ODATA_VER')/\$value"

            echo "$IFLOW_ID | v$VERSION"

            HTTP_CODE=$(curl -sS \
              --connect-timeout 10 \
              --max-time 90 \
              -w "%{http_code}" \
              -X GET "$URL" \
              -H "Authorization: Bearer $SAP_ACCESS_TOKEN" \
              -H "Accept: application/zip" \
              -o "$ZIP_FILE")

            if [ "$HTTP_CODE" = "200" ] && [ -s "$ZIP_FILE" ]; then
              echo "Downloaded ($HTTP_CODE)"

              if [ "$EXTRACT_ZIP" = "true" ]; then
                EXTRACT_PATH="$TARGET_PATH/extracted"
                rm -rf "$EXTRACT_PATH"
                mkdir -p "$EXTRACT_PATH"
                if unzip -tq "$ZIP_FILE" >/dev/null 2>&1; then
                  unzip -q "$ZIP_FILE" -d "$EXTRACT_PATH"
                  echo "Extracted"
                else
                  echo "Invalid ZIP, keeping raw file only"
                fi
              fi
            else
              echo "Failed (HTTP $HTTP_CODE)"
              rm -f "$ZIP_FILE"
              rmdir "$TARGET_PATH" 2>/dev/null || true
            fi
          done

          echo "Total ZIPs in $DOWNLOAD_DIR: $(find "$DOWNLOAD_DIR" -name "*.zip" | wc -l)"

      - name: Set download outcome output
        id: set_output
        if: always()
        shell: bash
        run: |
          echo "skip_download=${SKIP_DOWNLOAD:-false}" >> "$GITHUB_OUTPUT"

      - name: Commit and push downloaded iFlows
        if: env.SKIP_DOWNLOAD != 'true'
        shell: bash
        run: |
          set -euo pipefail

          git add "$DOWNLOAD_DIR"

          if git diff --staged --quiet; then
            echo "::notice title=Nothing to commit::No new files were staged."
            exit 0
          fi

          git commit -m "Download SAP BTP iFlows (X.Y.Z.$DEPLOYMENT_MARKER)"

          git fetch origin "$TARGET_BRANCH"
          if ! git pull --rebase origin "$TARGET_BRANCH"; then
            echo "Rebase conflict detected"
            git rebase --abort || true
            exit 1
          fi

          git push origin "$TARGET_BRANCH"
          echo "Pushed to branch: $TARGET_BRANCH"

      - name: Report clean run
        if: env.SKIP_DOWNLOAD == 'true'
        shell: bash
        run: |
          echo "::notice title=Success::All iFlows are already downloaded. Nothing new."

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: CPILint Quality Gate
  # ═══════════════════════════════════════════════════════════════
  run-cpilint:
    name: CPILint static analysis
    needs: download-ready-iflows
    if: needs.download-ready-iflows.outputs.skip_download != 'true'
    runs-on: ubuntu-latest

    outputs:
      result: ${{ steps.lint.outputs.result }}
      passed: ${{ steps.lint.outputs.passed }}
      failed: ${{ steps.lint.outputs.failed }}
      details: ${{ steps.lint.outputs.details }}

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify rules file
        shell: bash
        run: |
          [ ! -f "$CPILINT_RULES" ] && { echo "::error::$CPILINT_RULES not found"; exit 1; }
          echo "Rules file found: $CPILINT_RULES"

      - name: Install CPILint
        shell: bash
        run: |
          set -euo pipefail
          CPILINT_URL="https://github.com/mwittrock/cpilint/releases/download/v${CPILINT_VERSION}/cpilint-${CPILINT_VERSION}.zip"
          curl -sSL -o cpilint.zip "$CPILINT_URL"
          unzip -q cpilint.zip -d cpilint-tool
          CPILINT_BIN=$(find cpilint-tool -name "cpilint" -type f | head -1)
          chmod +x "$CPILINT_BIN"
          echo "CPILINT_BIN=$CPILINT_BIN" >> "$GITHUB_ENV"

      - name: Run CPILint
        id: lint
        shell: bash
        run: |
          set -euo pipefail
          echo "Running CPILint quality gate..."

          ZIP_FILES=$(find "$DOWNLOAD_DIR" -name "*.zip")
          ZIP_COUNT=$(echo "$ZIP_FILES" | grep -c . || echo 0)

          if [ "$ZIP_COUNT" -eq 0 ]; then
            echo "result=skipped" >> "$GITHUB_OUTPUT"
            echo "passed=0" >> "$GITHUB_OUTPUT"
            echo "failed=0" >> "$GITHUB_OUTPUT"
            echo "details=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TOTAL_PASSED=0
          TOTAL_FAILED=0
          DETAILS=""

          while IFS= read -r zip; do
            [ -z "$zip" ] && continue
            IFLOW_ID=$(basename "$(dirname "$(dirname "$zip")")")
            VERSION=$(basename "$(dirname "$zip")")

            echo "Linting: $IFLOW_ID v$VERSION"
            if "$CPILINT_BIN" -rules "$CPILINT_RULES" -files "$zip" 2>&1 | tee "cpilint-${IFLOW_ID}.log"; then
              echo "PASSED: $IFLOW_ID"
              TOTAL_PASSED=$((TOTAL_PASSED + 1))
              DETAILS="${DETAILS}${IFLOW_ID}|v${VERSION}|PASS"$'\n'
            else
              echo "FAILED: $IFLOW_ID"
              TOTAL_FAILED=$((TOTAL_FAILED + 1))
              DETAILS="${DETAILS}${IFLOW_ID}|v${VERSION}|FAIL"$'\n'
            fi
          done <<< "$ZIP_FILES"

          echo "Passed: $TOTAL_PASSED | Failed: $TOTAL_FAILED"
          echo "passed=$TOTAL_PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$TOTAL_FAILED" >> "$GITHUB_OUTPUT"

          {
            echo "details<<DETAILS_EOF"
            echo "$DETAILS"
            echo "DETAILS_EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$TOTAL_FAILED" -gt 0 ]; then
            echo "result=failed" >> "$GITHUB_OUTPUT"
            echo "::error::CPILint: $TOTAL_FAILED iFlow(s) failed"
            exit 1
          fi
          echo "result=passed" >> "$GITHUB_OUTPUT"

      - name: Upload CPILint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpilint-reports
          path: cpilint-*.log
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: Postman Collection Tests (Official Postman CLI)
  # ═══════════════════════════════════════════════════════════════
  run-postman:
    name: Postman collection tests
    needs: [download-ready-iflows, run-cpilint]
    if: needs.download-ready-iflows.outputs.skip_download != 'true' && needs.run-cpilint.outputs.result == 'passed'
    runs-on: ubuntu-latest

    outputs:
      result: ${{ steps.postman.outputs.result }}
      passed: ${{ steps.postman.outputs.passed }}
      failed: ${{ steps.postman.outputs.failed }}
      details: ${{ steps.postman.outputs.details }}

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Install Postman CLI
        shell: bash
        run: |
          set -euo pipefail
          echo "Installing official Postman CLI..."
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
          echo "Postman CLI: $(postman --version)"

      - name: Login to Postman CLI
        shell: bash
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${POSTMAN_API_KEY:-}" ]; then
            echo "::warning::POSTMAN_API_KEY not set - running collections in local mode only"
          else
            postman login --with-api-key "$POSTMAN_API_KEY"
            echo "Logged in to Postman CLI"
          fi

      - name: Run Postman collections
        id: postman
        shell: bash
        env:
          CPI_DEV_ENDPOINT: ${{ secrets.CPI_DEV_ENDPOINT }}
        run: |
          set -euo pipefail
          echo "Running Postman CLI tests..."

          COLLECTIONS=$(find "$DOWNLOAD_DIR" -path "*/tests/collection.json")
          COLL_COUNT=$(echo "$COLLECTIONS" | grep -c . || echo 0)

          if [ "$COLL_COUNT" -eq 0 ]; then
            echo "::notice::No Postman collections found"
            echo "result=skipped" >> "$GITHUB_OUTPUT"
            echo "passed=0" >> "$GITHUB_OUTPUT"
            echo "failed=0" >> "$GITHUB_OUTPUT"
            echo "details=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Collections found: $COLL_COUNT"

          TOTAL_PASSED=0
          TOTAL_FAILED=0
          DETAILS=""

          while IFS= read -r collection; do
            [ -z "$collection" ] && continue

            IFLOW_DIR=$(dirname "$(dirname "$collection")")
            IFLOW_ID=$(basename "$(dirname "$IFLOW_DIR")")
            VERSION=$(basename "$IFLOW_DIR")

            ENV_FILE="$(dirname "$collection")/environment.json"
            ENV_ARG=""
            [ -f "$ENV_FILE" ] && ENV_ARG="--environment $ENV_FILE"

            echo "─────────────────────────────────────────────"
            echo "Testing: $IFLOW_ID v$VERSION"
            echo "─────────────────────────────────────────────"

            # Postman CLI runs the local collection.json file directly
            if postman collection run "$collection" \
                $ENV_ARG \
                --env-var "baseUrl=$CPI_DEV_ENDPOINT" \
                2>&1 | tee "postman-${IFLOW_ID}.log"; then
              echo "PASSED: $IFLOW_ID"
              TOTAL_PASSED=$((TOTAL_PASSED + 1))
              DETAILS="${DETAILS}${IFLOW_ID}|v${VERSION}|PASS"$'\n'
            else
              echo "FAILED: $IFLOW_ID"
              TOTAL_FAILED=$((TOTAL_FAILED + 1))
              DETAILS="${DETAILS}${IFLOW_ID}|v${VERSION}|FAIL"$'\n'
            fi
          done <<< "$COLLECTIONS"

          echo "Passed: $TOTAL_PASSED | Failed: $TOTAL_FAILED"
          echo "passed=$TOTAL_PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$TOTAL_FAILED" >> "$GITHUB_OUTPUT"

          {
            echo "details<<DETAILS_EOF"
            echo "$DETAILS"
            echo "DETAILS_EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$TOTAL_FAILED" -gt 0 ]; then
            echo "result=failed" >> "$GITHUB_OUTPUT"
            echo "::error::Postman: $TOTAL_FAILED collection(s) failed"
            exit 1
          fi
          echo "result=passed" >> "$GITHUB_OUTPUT"

      - name: Upload Postman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-reports
          path: postman-*.log
          if-no-files-found: ignore
  # ═══════════════════════════════════════════════════════════════
  # JOB 4: Send Quality Gate Report Email
  # ═══════════════════════════════════════════════════════════════
  send-report:
    name: Send quality gate report
    needs: [download-ready-iflows, run-cpilint, run-postman]
    if: always() && needs.download-ready-iflows.outputs.skip_download != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Prepare report
        id: report
        shell: bash
        run: |
          set -euo pipefail

          CPILINT_RESULT="${{ needs.run-cpilint.result }}"
          POSTMAN_RESULT="${{ needs.run-postman.result }}"
          CP_PASS="${{ needs.run-cpilint.outputs.passed }}"
          CP_FAIL="${{ needs.run-cpilint.outputs.failed }}"
          PM_PASS="${{ needs.run-postman.outputs.passed }}"
          PM_FAIL="${{ needs.run-postman.outputs.failed }}"

          if [ "$CPILINT_RESULT" = "success" ] && [ "$POSTMAN_RESULT" = "success" ]; then
            OVERALL="PASSED"; PREFIX="[PASSED]"
          elif [ "$CPILINT_RESULT" = "failure" ] || [ "$POSTMAN_RESULT" = "failure" ]; then
            OVERALL="FAILED"; PREFIX="[FAILED]"
          else
            OVERALL="PARTIAL"; PREFIX="[PARTIAL]"
          fi

          echo "subject=$PREFIX Quality Gate Report - $(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

          # CPILint rows
          CP_ROWS=""
          while IFS='|' read -r id ver status; do
            [ -z "$id" ] && continue
            COLOR=$([ "$status" = "PASS" ] && echo "#107c10" || echo "#d13438")
            CP_ROWS="${CP_ROWS}<tr><td style='padding:8px;border:1px solid #ddd;'>${id}</td><td style='padding:8px;border:1px solid #ddd;'>${ver}</td><td style='padding:8px;border:1px solid #ddd;color:${COLOR};font-weight:bold;'>${status}</td></tr>"
          done <<< "${{ needs.run-cpilint.outputs.details }}"

          # Postman rows
          PM_ROWS=""
          while IFS='|' read -r id ver status; do
            [ -z "$id" ] && continue
            COLOR=$([ "$status" = "PASS" ] && echo "#107c10" || echo "#d13438")
            PM_ROWS="${PM_ROWS}<tr><td style='padding:8px;border:1px solid #ddd;'>${id}</td><td style='padding:8px;border:1px solid #ddd;'>${ver}</td><td style='padding:8px;border:1px solid #ddd;color:${COLOR};font-weight:bold;'>${status}</td></tr>"
          done <<< "${{ needs.run-postman.outputs.details }}"

          cat > report.html << HTML_EOF
<!DOCTYPE html>
<html><head><style>
  body { font-family: Arial, sans-serif; color: #24292e; max-width: 800px; margin: 0 auto; }
  .header { background: linear-gradient(135deg,#0366d6,#044289); color: white; padding: 25px; text-align: center; border-radius: 8px 8px 0 0; }
  .content { padding: 25px; border: 1px solid #e1e4e8; }
  table { width: 100%; border-collapse: collapse; margin: 10px 0; }
  th { background: #0366d6; color: white; padding: 10px; text-align: left; }
  .gate { background: #f6f8fa; padding: 12px; margin: 20px 0 8px; font-weight: bold; font-size: 16px; border-radius: 6px; }
</style></head>
<body>
  <div class="header">
    <h1>CI/CD Quality Gate Report</h1>
    <h2>Overall: ${OVERALL}</h2>
  </div>
  <div class="content">
    <p><strong>Branch:</strong> ${TARGET_BRANCH} | <strong>Time:</strong> $(date -u +'%Y-%m-%d %H:%M UTC')</p>

    <div class="gate">Gate 1: CPILint (Static) - Passed: ${CP_PASS:-0} | Failed: ${CP_FAIL:-0}</div>
    <table>
      <thead><tr><th>iFlow ID</th><th>Version</th><th>Result</th></tr></thead>
      <tbody>${CP_ROWS}</tbody>
    </table>

    <div class="gate">Gate 2: Postman (Runtime) - Passed: ${PM_PASS:-0} | Failed: ${PM_FAIL:-0}</div>
    <table>
      <thead><tr><th>iFlow ID</th><th>Version</th><th>Result</th></tr></thead>
      <tbody>${PM_ROWS}</tbody>
    </table>

    <p style="margin-top:20px;">Detailed logs available as workflow artifacts.</p>
    <p>id }}">View Full Workflow Run</a></p>
  </div>
</body></html>
HTML_EOF

          echo "Report prepared"

      - name: Send email report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ${{ steps.report.outputs.subject }}
          html_body: file://report.html
          from: SAP CPI CI/CD <${{ secrets.EMAIL_FROM }}>
          to: ${{ secrets.EMAIL_DISTRIBUTION_LIST }}
          echo "Report sent"
